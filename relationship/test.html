<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亲密关系心理测评 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/test-common.css">
<style>
/* --- Relationship Test Specific Overrides --- */
:root {
  --shadow: 0 1px 2px rgba(0,0,0,0.2);
  --radius: 0px;
}

.dim-tag { display: inline-block; padding: 6px 14px; border-radius: 0; font-size: 11px; font-weight: 500; margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.07); }

.result-header h1 { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 300; margin-bottom: 12px; letter-spacing: 4px; }
.result-header p { font-size: 12px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }

.card-title { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 500; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
.card-title .icon { width: 28px; height: 28px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.icon-purple { background: rgba(139,92,246,0.1); }
.icon-blue { background: rgba(59,130,246,0.1); }
.icon-green { background: rgba(16,185,129,0.1); }
.icon-orange { background: rgba(245,158,11,0.1); }
.icon-red { background: rgba(239,68,68,0.1); }
.icon-pink { background: rgba(236,72,153,0.1); }

.type-result { text-align: center; padding-bottom: 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.type-badge { display: inline-block; padding: 6px 20px; background: transparent; color: var(--primary); border: 1px solid rgba(139,92,246,0.3); border-radius: 0; font-size: 11px; font-weight: 500; margin-bottom: 18px; letter-spacing: 3px; text-transform: uppercase; }

.chart-wrap { max-width: 350px; margin: 0 auto; }

.dim-item:hover { border-color: rgba(139,92,246,0.2); }
.dim-item:last-child { margin-bottom: 0; }
.dim-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.dim-score { font-family: 'EB Garamond', serif; font-size: 22px; font-weight: 600; background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.dim-score span { font-size: 13px; font-weight: 400; background: none; -webkit-text-fill-color: var(--text-muted); }
.level-high { border-color: rgba(5,150,105,0.3); color: #34d399; }
.level-medium { border-color: rgba(217,119,6,0.3); color: #fbbf24; }
.level-low { border-color: rgba(220,38,38,0.3); color: #f87171; }
.dim-desc { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

.pattern-card { display: flex; gap: 16px; padding: 24px; background: rgba(139,92,246,0.03); border: 1px solid var(--border); border-radius: 0; margin-bottom: 10px; border-left: 2px solid var(--primary); position: relative; overflow: hidden; transition: border-color 0.3s; }
.pattern-card:hover { border-color: rgba(139,92,246,0.2); }
.pattern-card::after { display: none; }
.pattern-card:last-child { margin-bottom: 0; }
.pattern-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: none; }
.pattern-content h4 { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.pattern-content p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

.risk-box { padding: 24px; background: rgba(239,68,68,0.03); border-radius: 0; border: 1px solid rgba(239,68,68,0.1); }
.risk-item { display: flex; gap: 12px; margin-bottom: 14px; }
.risk-item:last-child { margin-bottom: 0; }
.risk-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 0; margin-top: 7px; flex-shrink: 0; }
.risk-text { font-size: 13px; color: rgba(252,165,165,0.8); line-height: 1.8; }

.celeb-box { display: flex; gap: 20px; align-items: center; padding: 28px; background: rgba(255,255,255,0.015); border-radius: 0; border: 1px solid var(--border); }
.celeb-avatar { width: 64px; height: 64px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.celeb-info h4 { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.celeb-info p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.celeb-info small { display: block; margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.25); }

.timeline { position: relative; padding-left: 36px; }
.timeline::before { content: ''; position: absolute; left: 12px; top: 6px; bottom: 6px; width: 1px; background: linear-gradient(180deg, var(--primary), rgba(139,92,246,0.1)); }
.timeline-step { position: relative; padding-bottom: 28px; padding-left: 8px; }
.timeline-step:last-child { padding-bottom: 0; }
.timeline-step::before { content: ''; position: absolute; left: -28px; top: 4px; width: 10px; height: 10px; background: var(--primary); border-radius: 0; border: 2px solid #0a0a0a; box-shadow: 0 0 8px rgba(139,92,246,0.3); }
.timeline-step .phase { font-family: 'EB Garamond', serif; font-size: 12px; color: rgba(139,92,246,0.55); font-weight: 600; margin-bottom: 6px; letter-spacing: 3px; text-transform: uppercase; }
.timeline-step h5 { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text); -webkit-text-fill-color: unset; background: none; }
.timeline-step p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

.rel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.rel-card { padding: 20px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; text-align: center; }
.rel-card .emoji { font-size: 24px; margin-bottom: 12px; }
.rel-card h5 { font-size: 13px; font-weight: 500; margin-bottom: 8px; letter-spacing: 1px; }
.rel-card p { font-size: 12px; color: var(--text-muted); line-height: 1.7; }

.summary-box { padding: 40px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; color: var(--text); text-align: center; position: relative; overflow: hidden; }
.summary-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); pointer-events: none; animation: none; }
@keyframes shimmer { 0%, 100% { transform: translateX(-30%) translateY(-30%); } 50% { transform: translateX(10%) translateY(10%); } }
.summary-box h3 { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 300; margin-bottom: 20px; letter-spacing: 4px; position: relative; z-index: 1; }
.summary-box p { font-size: 14px; line-height: 2; opacity: 0.7; max-width: 550px; margin: 0 auto; position: relative; z-index: 1; }

.disclaimer { padding: 20px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; margin-top: 16px; }
.disclaimer h5 { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 2px; text-transform: uppercase; }
.disclaimer p { font-size: 11px; color: var(--text-muted); line-height: 1.7; }

.download-section { text-align: center; padding-top: 16px; }
.download-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; background: var(--primary); color: white; border: none; border-radius: 0; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
.download-btn:hover { background: var(--primary-dark); box-shadow: 0 0 20px rgba(139,92,246,0.2); }
.download-btn:disabled { opacity: 0.5; cursor: wait; }

/* 加载 */
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading.show { opacity: 1; visibility: visible; }
.loading-box { background: #111; border: 1px solid var(--border); padding: 40px; border-radius: 0; text-align: center; }
.spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
.loading-box p { font-size: 13px; color: var(--text-muted); letter-spacing: 1px; }

/* 更多测试弹窗 */
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-content > p { color: var(--text-muted); font-size: 13px; line-height: 1.7; margin-bottom: 24px; }
.modal-tests { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; padding: 16px; margin-bottom: 16px; }
.modal-test-item { padding: 10px; font-size: 13px; color: var(--text); border-bottom: 1px solid var(--border); }
.modal-test-item:last-child { border-bottom: none; }
.modal-tip { font-size: 12px; color: var(--primary); font-weight: 500; margin-bottom: 20px; letter-spacing: 1px; }
.modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.modal-btn.secondary:hover { border-color: var(--primary); color: var(--primary); }
.more-tests-btn { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.2); color: rgba(251,191,36,0.7); }
.more-tests-btn:hover { border-color: rgba(245,158,11,0.4); color: #fbbf24; }

@media (max-width: 640px) {
  .rel-grid { grid-template-columns: 1fr; }
  .celeb-box { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<div class="noise"></div>

<div class="loading" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>正在生成PDF报告...</p>
  </div>
</div>

<!-- 测试页 -->
<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="exitTest()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        退出
      </button>
      <div class="progress-wrap">
        <div class="progress-text" id="progressText">第 1 / 48 题</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag" style="display:none">🧭 主体性</div>
      <div class="q-num" id="qNum">问题 1</div>
      <div class="q-text" id="qText">加载中...</div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" onclick="prevQ()" id="prevBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          上一题
        </button>
        <button class="nav-btn primary" onclick="nextQ()" id="nextBtn">
          下一题
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 结果页 -->
<div id="resultPage" class="page">
  <div class="result-container">
    <div class="result-header">
      <h1>🧂 测评报告</h1>
      <p>宇宙认知盐究所 · 亲密关系心理测评</p>
    </div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
// 题目数据
const questions = [
  // === agency（主体性）1-12 ===
  "在一段重要的关系里，你的声音更像什么——是回声，总在重复对方说过的话；还是一段属于自己的独立旋律？",
  "想象你和伴侣站在十字路口，方向完全相反。你是那个能够安静地说出「我要走这条路」的人吗？",
  "如果关系是一面镜子，你在里面看到的更多是自己的轮廓，还是已经被对方的影子完全覆盖？",
  "做一个重要决定时，你更像一棵有自己根系的树，还是一株需要缠绕在别人身上才能站稳的藤蔓？",
  "闭上眼睛想一想：在「恋人」这个角色之外，你是否仍然清楚地知道自己是谁？",
  "当对方的期望和你内心深处的渴望发生冲突时，你能否听见自己心跳的节奏，而不只是对方呼吸的声音？",
  "如果恋爱是一场远行，你会不会为了让同伴高兴，把自己最想去的目的地从地图上擦掉？",
  "你的生活里是否有一些房间，是只属于你自己的——关上门，里面有你的书、你的朋友、你的独处？",
  "当你在关系里说出一个不同的观点，身体里升起的是表达的畅快，还是一种隐隐的负罪感？",
  "妥协和坚守之间有一条细细的线。你是否感觉自己大多数时候站在线的哪一边，不至于迷失？",
  "如果伴侣对你的某个判断摇了摇头，你的内心是否还能稳稳地站着，像风中不倒的烛火？",
  "在最亲密的关系里，你是否仍然拥有一颗独立跳动的心——它爱着对方，却不因此失去自己的韵律？",
  // === boundary（边界感）13-24 ===
  "当你说「不」的时候，身体里发生了什么——是平静的呼气，还是胃部一阵紧缩和愧疚的浪潮？",
  "想象你的价值观是一盏灯。在关系的种种行为中，你是否能清晰地分辨哪些行为在灯光之内，哪些已经落入阴影？",
  "当有人越过了你心里那条线，你是那个能立刻说「请退后」的人，还是会默默吞下不适，假装线不存在？",
  "如果伴侣的快乐需要用你的基本需求来交换，你是否愿意做这笔交易？",
  "在给予和接受之间，你是否像潮汐一样自然地来回流动，而不是永远只朝一个方向涌去？",
  "你是否能在伴侣的世界门口停下脚步，尊重那扇关着的门，而不是忍不住推开每一扇？",
  "如果隐私是一座小花园，你和伴侣是否各自拥有自己的花园，并且不会不请自入？",
  "当伴侣低落时，你是否能分清哪些是对方天空的乌云，哪些才是飘到你上方的那一片？",
  "别人的问题像一个沉重的包裹递过来的时候，你是否能辨认出哪些该帮忙提，哪些从一开始就不属于你？",
  "你的世界里是否保留了一些只属于自己的颜色——那些不会因为恋爱而褪去的爱好和热情？",
  "面对一个不合理的要求时，你的「不」是否能像石头一样稳稳落地，而不是像气球一样飘走？",
  "你是否曾经注意到，自己正在用健康和精力为关系支付一张越来越昂贵的账单？",
  // === emotion（情绪调节）25-36 ===
  "当争吵的风暴来临时，你是否能像灯塔一样保持相对的稳定，而不是被卷进海浪里？",
  "如果每种情绪都有名字，你是否认识关系里那些来访的客人——知道哪位叫「委屈」，哪位叫「失望」？",
  "情绪最汹涌的时刻，你是否拥有一个内在的「暂停键」——可以在冲动行动之前按下它？",
  "当负面情绪像烟雾一样升起，你是否有一扇能打开的窗户，以健康的方式让它流通出去？",
  "如果受伤是一场突如其来的雨，你身上是否有自己的伞，而不是只能站在对方的伞下才不会淋湿？",
  "面对关系里那些悬而未决的不确定，你是否能像等待日出的人一样安静，而不是在黑暗中反复点火？",
  "你处理关系里的痛苦时，更像是把它放进抽屉锁起来假装看不见，还是把它拿到光线下仔细端详？",
  "关系里的一次挫折，在你的世界里停留多久——是一场很快散去的雾，还是一个久久不退的冬天？",
  "你的情绪反应和实际发生的事情之间，是否像合身的衣服——不会小三号让你喘不过气，也不会大三号空空荡荡？",
  "当关系变得紧张时，你是否有一套属于自己的「着陆程序」——深呼吸、散步、或某种让自己回到地面的方法？",
  "过去关系里的伤痕，是否仍然在此刻的关系里隐隐作痛——像一面裂了的旧镜子，扭曲着你看到的画面？",
  "在低谷时刻，你是否知道可以向谁伸出手——不一定是伴侣，而是任何一个安全的港湾？",
  // === attachment（依恋反应）37-48 ===
  "如果信任是一座桥，你是否相信走到桥中间的时候，对面的人不会突然抽走木板？",
  "半夜醒来的时候，你的脑海里是否会浮现「对方真的爱我吗」这个问题，像一盏不肯熄灭的灯？",
  "当伴侣说「我想一个人待一会儿」，你听到的是一句平常的话，还是一扇突然关上的门和被遗弃的回声？",
  "你是否能舒适地让自己倚靠在另一个人身上——同时也允许对方倚靠过来——像两棵靠在一起却各自扎根的树？",
  "短暂的分离对你来说更像什么——一个正常的逗号，还是一个让人恐慌的省略号？",
  "当关系遭遇风浪时，你对自己的肯定是否还在那里——像海底的锚，不会因为海面的波涛而消失？",
  "你是否需要时刻知道伴侣在哪里、在做什么，才能让内心那个不安的声音安静下来？",
  "关系出了问题的时候，你脑海里第一个浮现的画面是什么——是「我们可以解决」的路，还是「一切都完了」的悬崖？",
  "在亲密和独立之间，你是否找到了那个让两者共存的温度——不过热到灼伤，也不过冷到冻僵？",
  "当有人走近你的内心，你更像是打开一扇门，还是本能地筑起一堵墙？",
  "你是否能坐在伴侣对面，把那些让关系隐隐作痛的事情说出来，而不是把它们藏在沉默的角落里发霉？",
  "你是否相信，两个人之间大多数的结，都可以被耐心和真诚慢慢解开？"
];

const dims = [...Array(12).fill("agency"), ...Array(12).fill("boundary"), ...Array(12).fill("emotion"), ...Array(12).fill("attachment")];
const dimInfo = {
  agency: { name: "主体性", icon: "🧭", color: "#a78bfa", bg: "rgba(139,92,246,0.2)" },
  boundary: { name: "边界感", icon: "🛡", color: "#60a5fa", bg: "rgba(59,130,246,0.2)" },
  emotion: { name: "情绪调节", icon: "🌊", color: "#34d399", bg: "rgba(16,185,129,0.2)" },
  attachment: { name: "依恋反应", icon: "🔗", color: "#fbbf24", bg: "rgba(245,158,11,0.2)" }
};

const RESULT_MAP = {
  anxious_low: {
    name: "轻度焦虑型依恋",
    celeb: "玛丽莲·梦露",

let idx = 0;
let answers = Array(48).fill(null);

  const d = dims[idx], info = dimInfo[d];
  document.getElementById('progressText').textContent = `第 ${idx + 1} / 48 题`;
  document.getElementById('progressFill').style.width = `${((idx + 1) / 48) * 100}%`;
  document.getElementById('dimTag').innerHTML = `${info.icon} ${info.name}`;
  document.getElementById('dimTag').style.background = info.bg;
  document.getElementById('dimTag').style.color = info.color;
  document.getElementById('qNum').textContent = `问题 ${idx + 1}`;
  document.getElementById('qText').textContent = questions[idx];

  const opts = [{ v: 1, t: "非常不符合" }, { v: 2, t: "比较不符合" }, { v: 3, t: "比较符合" }, { v: 4, t: "非常符合" }];
  document.getElementById('options').innerHTML = opts.map(o => `
    <div class="opt ${answers[idx] === o.v ? 'selected' : ''}" onclick="select(${o.v})">
      <div class="opt-radio"></div>
      <span class="opt-text">${o.t}</span>
    </div>
  `).join('');

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').innerHTML = idx === 47 ? '查看结果 →' : '下一题 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
}

function select(v) { answers[idx] = v; render(); if (idx < 47) setTimeout(() => nextQ(), 250); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() {
  if (answers[idx] === null) { alert('请先选择一个选项'); return; }
  if (idx < 47) { idx++; render(); } else showResult();
}
function exitTest() {
  if (confirm('确定退出？答案将不会保存。')) {

function calcScores() {
  const s = { agency: 0, boundary: 0, emotion: 0, attachment: 0 };
  answers.forEach((v, i) => s[dims[i]] += v);
  return s;
}

function getType(s) {
  if (s.attachment > 36 && s.emotion > 36) return "anxious_high";
  if (s.attachment > 32 && s.emotion > 30) return "anxious_low";
  if (s.attachment < 28 && s.boundary > 36) return "avoidant_high";
  if (s.attachment < 32 && s.boundary > 30) return "avoidant_low";
  if (s.emotion > 40) return "high_emotion";
  if (s.boundary < 28) return "low_boundary";
  if (s.boundary > 40) return "high_boundary";
  if (s.attachment < 24) return "low_attachment";
  if (s.attachment > 36 && s.boundary < 30) return "mixed_anxious";
  if (s.attachment < 30 && s.emotion < 30) return "mixed_avoidant";
  if (s.agency > 38 && s.boundary > 38 && s.emotion > 38 && s.attachment > 38) return "secure";
  return "balanced";
}

function getLevel(score) {
  if (score >= 42) return { level: "优秀", cls: "level-high", pct: "前15%", color: "#059669" };
  if (score >= 36) return { level: "良好", cls: "level-high", pct: "前35%", color: "#10b981" };
  if (score >= 30) return { level: "发展中", cls: "level-medium", pct: "中间40%", color: "#d97706" };
  if (score >= 24) return { level: "成长期", cls: "level-medium", pct: "后35%", color: "#f59e0b" };
  return { level: "探索期", cls: "level-medium", pct: "后15%", color: "#6366f1" };
}

        <div style="font-size:14px;font-weight:600;color:#60a5fa;margin-bottom:8px;">心理学视角</div>
        <div style="font-size:13px;color:#94a3b8;line-height:1.8;font-style:italic;">${result.theory}</div>
      </div>

      <div style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;padding:28px;margin-bottom:15px;color:#fff;text-align:center;">
        <div style="font-size:18px;font-weight:600;margin-bottom:14px;">写给你的话</div>
        <div style="font-size:14px;line-height:1.8;opacity:0.95;">亲密关系是我们认识自己、成长自己的一面镜子。无论你目前处于什么样的依恋模式，这都不是固定不变的标签，而是一个起点。每一种模式都有其存在的原因和价值，也都有成长的空间。重要的不是成为「完美」的伴侣，而是在关系中保持觉察、真诚和成长的意愿。你值得拥有健康、滋养的亲密关系。</div>
      </div>

      <div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:25px;text-align:center;border:1px solid rgba(167,139,250,0.15);">
        <div style="font-size:13px;color:#c4b5fd;font-weight:500;margin-bottom:12px;letter-spacing:2px;">关于爱与依恋的哲思</div>
        <div style="font-size:12px;color:#94a3b8;line-height:2;">鲍尔比说，依恋是「从摇篮到坟墓」的需求。<br>温尼科特说，「独处的能力建立在有人在场的经验上」。<br>荣格说，「与另一个人的相遇，如同接触一种化学物质——双方都会被改变」。<br><br>也许爱的终极形态不是完美的融合，<br>而是两个不完美的人，在彼此的不完美中看见了自己，然后选择留下来。</div>
      </div>

      <div style="background:#1e293b;border-radius:12px;padding:20px;text-align:center;color:#64748b;font-size:12px;">
        <div style="margin-bottom:8px;font-weight:500;">宇宙认知盐究所 · Space Salt Lab</div>
        <div>本报告仅供参考，不构成心理诊断或医学建议。如果您正在经历严重的情绪困扰或关系问题，建议寻求专业心理咨询师的帮助。</div>
      </div>
    `;

    document.body.appendChild(pdfContainer);

    // 等待字体加载
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));

    // 截图
    const canvas = await html2canvas(pdfContainer, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#0f172a',
      logging: false,
      height: pdfContainer.scrollHeight,
      windowHeight: pdfContainer.scrollHeight
    });

    document.body.removeChild(pdfContainer);

    // 生成PDF
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = canvas.width;
    const imgH = canvas.height;

    const pdfW = 210; // A4宽度mm
    const pdfH = 297; // A4高度mm
    const ratio = imgW / imgH;

    let finalW = pdfW - 20;
    let finalH = finalW / ratio;

    const pdf = new jsPDF('p', 'mm', 'a4');
    let yPos = 10;
    let remainingH = imgH;
    let srcY = 0;

    // 计算每页能显示的像素高度
    const pagePixelH = (pdfH - 20) / finalH * imgH;

    while (remainingH > 0) {
      const sliceH = Math.min(remainingH, pagePixelH);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = imgW;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);

      const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
      const sliceRatio = imgW / sliceH;
      const sliceFinalH = finalW / sliceRatio;

      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, sliceFinalH);

      srcY += sliceH;
      remainingH -= sliceH;
    }

    pdf.save(`亲密关系心理测评报告_${date}.pdf`);
  } catch (e) {
    console.error(e);
    alert('PDF生成失败，请稍后重试');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告';
    loading.classList.remove('show');
  }
}

render();
