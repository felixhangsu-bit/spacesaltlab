<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动物投射测试 | 宇宙认知盐究所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --gradient: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
  --bg: #0f0f1a;
  --text: #ffffff;
  --text-muted: rgba(255,255,255,0.6);
  --border: rgba(255,255,255,0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background:
    radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.6), transparent);
  background-size: 200px 200px;
  animation: twinkle 4s ease-in-out infinite;
}
@keyframes twinkle { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
.glow {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.3;
  pointer-events: none;
}
.glow-1 { top: -200px; right: -100px; background: #f59e0b; }
.glow-2 { bottom: -200px; left: -100px; background: #ef4444; }
.container {
  position: relative;
  z-index: 1;
  max-width: 500px;
  margin: 0 auto;
  padding: 60px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.logo-section { text-align: center; margin-bottom: 40px; }
.logo {
  width: 100px; height: 100px;
  margin: 0 auto 24px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  box-shadow: 0 20px 60px rgba(245, 158, 11, 0.4);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.brand-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.brand-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 3px; }
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  text-align: center;
}
.card h2 { font-size: 24px; margin-bottom: 12px; }
.card .desc { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.7; }
.stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 32px; }
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: #f59e0b; }
.stat-label { font-size: 12px; color: var(--text-muted); }
.input-group { margin-bottom: 24px; text-align: left; }
.input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.input-group input {
  width: 100%;
  padding: 16px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
}
.input-group input:focus {
  border-color: #f59e0b;
  box-shadow: 0 0 0 4px rgba(245,158,11,0.1);
}
.btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,158,11,0.4); }
.error { color: #f87171; font-size: 14px; margin-top: 16px; display: none; }
.error.show { display: block; }
.hint {
  margin-top: 20px;
  padding: 14px;
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 10px;
  font-size: 12px;
  color: #fbbf24;
}
.footer { text-align: center; margin-top: 40px; font-size: 12px; color: var(--text-muted); }
.intro-section { margin-bottom: 24px; }
.intro-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.intro-list { text-align: left; padding-left: 0; }
.intro-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
}
.intro-icon {
  width: 28px;
  height: 28px;
  background: rgba(245, 158, 11, 0.2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.password-section { display: block; }
.password-section.hidden { display: none; }
</style>
</head>
<body>
<div class="stars"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="container">
  <div class="logo-section">
    <div class="logo">🧂</div>
    <h1 class="brand-name">宇宙认知盐究所</h1>
    <p class="brand-sub">SPACE SALT LAB</p>
  </div>
  <div class="card">
    <h2>🦊 动物投射测试</h2>
    <p class="desc">这不是性格测试，而是：<br><strong>你在不同心理状态下，会自动切换成哪种人格模式</strong></p>
    <div class="stats">
      <div class="stat"><div class="stat-num">16</div><div class="stat-label">情境题目</div></div>
      <div class="stat"><div class="stat-num">4</div><div class="stat-label">心理情境</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">动物人格</div></div>
    </div>

    <div class="intro-section">
      <div class="intro-title">测评情境</div>
      <div class="intro-list">
        <div class="intro-item">
          <div class="intro-icon">🌿</div>
          <div>放松安全时 - 你最本真的状态</div>
        </div>
        <div class="intro-item">
          <div class="intro-icon">💕</div>
          <div>亲密关系中 - 你在爱里的样子</div>
        </div>
        <div class="intro-item">
          <div class="intro-icon">⚡</div>
          <div>冲突压力下 - 你的防御反应</div>
        </div>
        <div class="intro-item">
          <div class="intro-icon">🌟</div>
          <div>被需要时 - 你如何回应期待</div>
        </div>
      </div>
    </div>

    <div class="password-section" id="passwordSection">
      <div class="input-group">
        <label>请输入测评密码</label>
        <input type="password" id="pwd" placeholder="输入密码开始测评" onkeypress="if(event.keyCode===13)checkPassword()">
      </div>
      <button class="btn" onclick="checkPassword()">验证并开始</button>
      <p class="error" id="err">密码错误，请重新输入</p>
      <div class="hint"><strong>提示：</strong>请联系顾问获取测评密码</div>
    </div>

    <div class="password-section hidden" id="directStart">
      <button class="btn" onclick="startTest()">开始测评</button>
    </div>
  </div>
  <div class="footer">
    <p>© 2026 宇宙认知盐究所</p>
    <p style="margin-top:6px">测评结果仅供参考，不构成心理诊断</p>
  </div>
</div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const fromPlatform = urlParams.get('from') === 'platform';

const singleTestAuth = localStorage.getItem('animal_auth');
const singleTestAuthTime = localStorage.getItem('animal_auth_time');
const isAuthValid = singleTestAuth === 'true' && singleTestAuthTime &&
  (Date.now() - parseInt(singleTestAuthTime)) < 3600000;

if (fromPlatform) {
  sessionStorage.setItem('user_source', 'platform');
  document.getElementById('passwordSection').classList.add('hidden');
  document.getElementById('directStart').classList.remove('hidden');
} else if (isAuthValid) {
  document.getElementById('passwordSection').classList.add('hidden');
  document.getElementById('directStart').classList.remove('hidden');
} else {
  sessionStorage.setItem('user_source', 'single');
}

function checkPassword() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === '462058') {
    localStorage.setItem('animal_auth', 'true');
    localStorage.setItem('animal_auth_time', Date.now().toString());
    sessionStorage.setItem('user_source', 'single');
    window.location.href = 'test.html';
  } else {
    document.getElementById('err').classList.add('show');
    document.getElementById('pwd').value = '';
  }
}

function startTest() {
  if (fromPlatform) {
    sessionStorage.setItem('user_source', 'platform');
  }
  window.location.href = 'test.html';
}
</script>
</body>
</html>
