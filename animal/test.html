<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动物投射测试 | 宇宙认知盐究所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary: #8b5cf6;
  --primary-dark: #7c3aed;
  --primary-light: #a78bfa;
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.025);
  --card-border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.07);
  --accent: rgba(139,92,246,0.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-weight: 300; }
.noise { position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }

/* 测试页 */
#testPage { background: var(--bg); padding: 20px; }
.test-container { max-width: 700px; margin: 0 auto; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 8px 12px; border-radius: 0; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
.back-btn:hover { border-color: rgba(139,92,246,0.4); color: var(--text); }
.progress-wrap { text-align: right; }
.progress-text { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 40px; position: relative; overflow: hidden; }
.question-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent); }
.q-num { font-size: 13px; color: var(--accent); margin-bottom: 10px; font-family: 'EB Garamond', serif; letter-spacing: 3px; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 32px; font-family: 'Noto Serif SC', serif; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; transition: all 0.2s; }
.opt:hover { border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.04); }
.opt.selected { border-color: rgba(139,92,246,0.6); background: rgba(139,92,246,0.08); }
.opt-radio { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-text { font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.45); line-height: 2.0; }
.opt.selected .opt-text { color: var(--text); }
.nav-btns { display: flex; gap: 12px; margin-top: 32px; }
.nav-btn { flex: 1; padding: 14px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.nav-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
.nav-btn.secondary:hover { border-color: rgba(139,92,246,0.4); }
.nav-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.nav-btn.primary:hover { background: rgba(139,92,246,0.25); }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 结果页 */
#resultPage { background: var(--bg); }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.result-header { text-align: center; margin-bottom: 40px; }
.result-logo { font-size: 64px; margin-bottom: 16px; }
.result-title { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; font-family: 'Noto Serif SC', serif; }
.result-subtitle { color: var(--text-muted); font-size: 15px; font-weight: 300; }
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent); }
.section-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); font-family: 'Noto Serif SC', serif; }
.section-icon { width: 36px; height: 36px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }

/* 动物人格卡片 */
.animal-main { display: flex; gap: 24px; align-items: center; padding: 24px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; margin-bottom: 20px; position: relative; overflow: hidden; }
.animal-main::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent); }
.animal-icon { font-size: 72px; }
.animal-info h3 { font-size: 24px; color: var(--primary-light); margin-bottom: 8px; font-family: 'Noto Serif SC', serif; }
.animal-info .subtitle { font-size: 14px; color: var(--accent); margin-bottom: 12px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.animal-info p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 2.0; font-weight: 300; }

.animal-secondary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 20px; }
.animal-card { padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; text-align: center; }
.animal-card .icon { font-size: 40px; margin-bottom: 8px; }
.animal-card .name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; font-family: 'Noto Serif SC', serif; }
.animal-card .context { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.animal-card .desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; font-weight: 300; }

/* 情境分析 */
.situation-analysis { margin-top: 20px; }
.situation-item { padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; margin-bottom: 12px; }
.situation-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.situation-icon { width: 40px; height: 40px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.situation-name { font-weight: 600; color: var(--text); font-family: 'Noto Serif SC', serif; }
.situation-animal { font-size: 13px; color: var(--primary-light); }
.situation-desc { font-size: 14px; color: var(--text-muted); line-height: 2.0; font-weight: 300; }

/* 切换模式分析 */
.switch-analysis { padding: 20px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; margin-top: 20px; position: relative; overflow: hidden; }
.switch-analysis::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent); }
.switch-title { font-weight: 600; color: var(--primary-light); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: 'Noto Serif SC', serif; }
.switch-content { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 2.0; font-weight: 300; }

/* 建议 */
.tip-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.tip-item:last-child { border-bottom: none; }
.tip-num { width: 28px; height: 28px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); border-radius: 0; display: flex; align-items: center; justify-content: center; color: var(--primary-light); font-size: 14px; font-weight: 600; flex-shrink: 0; font-family: 'EB Garamond', serif; }
.tip-text { font-size: 14px; color: var(--text-muted); line-height: 2.0; font-weight: 300; }

/* 按钮 */
.action-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 32px; }
.action-btn { flex: 1; min-width: 140px; padding: 16px 24px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.action-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.action-btn.primary:hover { background: rgba(139,92,246,0.25); }
.action-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
.action-btn.secondary:hover { border-color: rgba(139,92,246,0.4); }
.restart-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 16px 24px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.restart-btn:hover { border-color: rgba(139,92,246,0.4); }

/* 弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-content { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 0; padding: 40px; max-width: 400px; text-align: center; }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-size: 20px; margin-bottom: 12px; font-family: 'Noto Serif SC', serif; }
.modal-content p { color: var(--text-muted); margin-bottom: 24px; font-weight: 300; }
.modal-btn { padding: 14px 32px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 2px; }
.modal-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }

/* loading */
.loading-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading-overlay.show { opacity: 1; visibility: visible; }
.loading-spinner { width: 48px; height: 48px; border: 1px solid rgba(255,255,255,0.07); border-top: 1px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* 天赋点系统 */
.talent-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
.talent-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; padding: 16px; }
.talent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.talent-icon { font-size: 20px; }
.talent-name { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'Noto Serif SC', serif; }
.talent-score { margin-left: auto; font-size: 20px; font-weight: 700; font-family: 'EB Garamond', serif; }
.talent-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 0; overflow: hidden; margin-bottom: 6px; }
.talent-fill { height: 100%; border-radius: 0; transition: width 0.5s ease-out; }
.talent-desc { font-size: 12px; color: var(--text-muted); font-weight: 300; }

.talent-highlight { background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; padding: 20px; margin-top: 20px; position: relative; overflow: hidden; }
.talent-highlight::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent); }
.talent-highlight-title { font-size: 15px; font-weight: 600; color: var(--primary-light); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: 'Noto Serif SC', serif; }
.talent-highlight-content { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 2.0; font-weight: 300; }
.talent-top-item { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
.talent-top-item:last-child { margin-bottom: 0; }
.talent-badge { width: 36px; height: 36px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.talent-top-name { font-size: 14px; font-weight: 600; color: var(--primary-light); margin-bottom: 4px; font-family: 'Noto Serif SC', serif; }
.talent-top-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 2.0; font-weight: 300; }

.talent-growth { background: rgba(139,92,246,0.04); border: 1px solid rgba(139,92,246,0.1); border-radius: 0; padding: 16px; margin-top: 16px; }
.talent-growth-title { font-size: 14px; font-weight: 600; color: var(--primary-light); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-family: 'Noto Serif SC', serif; }
.talent-growth-content { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 2.0; font-weight: 300; }

/* 渐变文字效果 */
.gradient-text {
  background: linear-gradient(135deg, #ddd6fe, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 章节装饰分隔线 */
.section-divider {
  height: 1px;
  background: rgba(255,255,255,0.05);
  border-radius: 0;
  margin: 28px 0;
}

/* 动物人格卡片增强 - 带左侧彩条 */
.animal-card-enhanced {
  padding: 20px;
  background: rgba(255,255,255,0.02);
  border-radius: 0;
  text-align: center;
  border-left: 2px solid var(--primary);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.animal-card-enhanced::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), transparent);
}

/* 哲学引言区块 */
.philosophy-quote {
  background: rgba(255,255,255,0.02);
  border-radius: 0;
  padding: 32px;
  margin-bottom: 24px;
  text-align: center;
  position: relative;
  border: 1px solid var(--border);
}
.philosophy-quote::before {
  content: '\201C';
  position: absolute;
  top: 10px;
  left: 20px;
  font-size: 60px;
  color: rgba(139, 92, 246, 0.12);
  font-family: 'EB Garamond', Georgia, serif;
  line-height: 1;
}
.philosophy-quote .quote-text {
  font-size: 16px;
  color: rgba(255,255,255,0.45);
  line-height: 2.0;
  font-style: italic;
  margin-bottom: 12px;
  font-weight: 300;
  font-family: 'Noto Serif SC', serif;
}
.philosophy-quote .quote-author {
  font-size: 13px;
  color: var(--accent);
  font-family: 'EB Garamond', serif;
  letter-spacing: 2px;
}

/* 代表人物标签 */
.figure-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(139,92,246,0.06);
  border: 1px solid rgba(139,92,246,0.15);
  border-radius: 0;
  padding: 4px 14px;
  font-size: 12px;
  color: var(--primary-light);
  margin-top: 8px;
  font-family: 'EB Garamond', serif;
  letter-spacing: 1px;
}

/* 情境卡片增强 */
.situation-item-enhanced {
  padding: 20px;
  background: rgba(255,255,255,0.02);
  border-radius: 0;
  margin-bottom: 12px;
  border-left: 2px solid transparent;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: all 0.3s;
}

/* 哲学尾声卡片 */
.philosophy-closing {
  background: rgba(255,255,255,0.02);
  border-radius: 0;
  padding: 40px 32px;
  margin-bottom: 24px;
  text-align: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.philosophy-closing::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #8b5cf6, transparent);
}
.philosophy-closing::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(255,255,255,0.05);
}

/* 结果页标题增强 */
.result-title-enhanced {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ddd6fe, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-family: 'Noto Serif SC', serif;
}

/* 装饰性小标签 */
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.02);
  border-radius: 0;
  padding: 3px 12px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  font-family: 'EB Garamond', serif;
  letter-spacing: 2px;
}

@media (max-width: 640px) {
  .animal-main { flex-direction: column; text-align: center; }
  .action-buttons { flex-direction: column; }
  .talent-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="noise"></div>

<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="if(confirm('确定要退出吗？'))location.href='index.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回
      </button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 16</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:6.25%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="q-num">第 <span id="qNum">1</span> 题</div>
      <div class="q-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prev()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          上一题
        </button>
        <button class="nav-btn primary" id="nextBtn" onclick="next()" disabled>
          下一题
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container" id="resultContent"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <p style="margin-top:16px;color:var(--text-muted)">正在生成PDF报告...</p>
</div>

<script>
const questions = [
  // 放松安全时 (4题)
  { q: "如果你的内心是一间房子，没有客人的时候，房间里会是什么样子？", situation: "relax", options: [
    { text: "窗帘半掩，一本翻到一半的书搁在扶手上，安静得能听见灰尘落地", animals: ["cat", "owl"] },
    { text: "门虚掩着，桌上有两杯没喝完的茶，仿佛随时有人会推门进来", animals: ["dog", "dolphin"] },
    { text: "墙上挂满了地图和笔记，某个角落堆着还没拆封的新工具", animals: ["owl", "fox"] },
    { text: "花瓶里插着今早刚剪的花，桌上摊开着写了一半的信", animals: ["fox", "deer"] }

let idx = 0;
let answers = new Array(16).fill(null);

function render() {
  const q = questions[idx];

  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('progressFill').style.width = `${((idx + 1) / questions.length) * 100}%`;
  document.getElementById('questionText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = q.options.map((opt, i) => `
    <div class="opt ${answers[idx] === i ? 'selected' : ''}" onclick="select(${i})">
      <div class="opt-radio"></div>
      <div class="opt-text">${opt.text}</div>
    </div>
  `).join('');

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').innerHTML = idx === questions.length - 1 ?
    '查看结果 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' :
    '下一题 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  document.getElementById('nextBtn').disabled = answers[idx] === null;
}

function select(i) {
  answers[idx] = i;
  render();
  if (idx < questions.length - 1) setTimeout(() => next(), 300);
  else setTimeout(() => next(), 300);
}

function prev() {
  if (idx > 0) { idx--; render(); }
}

function next() {
  if (answers[idx] === null) return;
  if (idx < questions.length - 1) { idx++; render(); }
  else { showResult(); }
}

function calcScores() {
  const scores = {};
  const situationScores = { relax: {}, intimate: {}, conflict: {}, expected: {} };

  Object.keys(animals).forEach(a => {
    scores[a] = 0;
    Object.keys(situations).forEach(s => situationScores[s][a] = 0);
  });

  answers.forEach((ansIdx, qIdx) => {
    if (ansIdx === null) return;
    const q = questions[qIdx];
    const selectedAnimals = q.options[ansIdx].animals;
    selectedAnimals.forEach((a, i) => {
      const points = i === 0 ? 2 : 1;
      scores[a] += points;
      situationScores[q.situation][a] += points;
    });
  });

  return { total: scores, bySituation: situationScores };
}

function getTopAnimals(scores, count = 2) {
  return Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, count)
    .map(([animal]) => animal);
}

function getSituationAnimal(situationScores) {
  const result = {};
  Object.entries(situationScores).forEach(([sit, scores]) => {
    const top = getTopAnimals(scores, 1)[0];
    result[sit] = top;
  });
  return result;
}

  if (switchCount === 1) {
    return { type: "磐石型 · 不动如山", desc: "哲学家帕斯卡尔说：「人是一根会思考的芦苇。」而你更像一棵扎根极深的古树——无论四季如何更替，你的枝干始终指向同一片天空。你在不同情境下展现的人格模式惊人地一致，这意味着你拥有一个异常稳定的核心自我。你不是不会变，而是你的「变」发生在更深的层面——外在的波澜不惊之下，是一个早已与自己和解的灵魂。这是一种难得的内在统一性，但也请偶尔允许自己松动一些：水至清则无鱼，过于一致的应对模式有时会让你错过某些需要灵活应变的人生转角。" };

  } else if (switchCount === 3) {
    return { type: "棱镜型 · 一光三折", desc: "一束白光穿过棱镜，会折射出多种颜色——你就是那面棱镜。你在不同情境下会展现出三种不同的人格面向，这是一种令人印象深刻的适应力。心理学家威廉·詹姆斯曾说：「一个人有多少社会关系，就有多少个社会自我。」你深谙此道。你能根据场景需要切换频道，像一个出色的即兴演奏者，在不同的调性之间自如游走。这种多面性不是虚伪，而是你对复杂世界的深层理解。唯一需要留意的是：切换越多，维护每个面向的能量消耗越大——记得定期回到「无需表演」的状态，找到那个不需要切换的自己。" };
  } else {
    return { type: "万花筒型 · 千面一心", desc: "尼采说过：「一个人知道自己为什么而活，就可以忍受任何一种生活。」你在每种情境下都展现出不同的人格模式，像一个万花筒——每转一下就呈现新的图案，但构成图案的碎片始终是同一批。这种极强的情境适应能力让你在各种社交场合都如鱼得水，但也可能在某个深夜让你产生「我到底是谁」的存在性追问。这不是病，这是一个高度复杂灵魂的自我探询。建议你给自己一些「卸下所有面具」的时间——在那些独处的时刻，所有面向会像河流汇入大海一样回归同一个你。那个最安静的版本，就是答案。" };
  }
}

function getEnergyDrain(situationAnimals) {
  const conflictAnimal = situationAnimals.conflict;
  const relaxAnimal = situationAnimals.relax;

  if (conflictAnimal === relaxAnimal) {
    return "你在压力下和放松时的状态比较一致，说明冲突对你的消耗相对较小。你能用相对自然的方式应对压力。";
  }

  const drainMap = {
    "deer": "冲突情境对你的消耗最大。你天性敏感温柔，激烈的对抗会让你感到巨大的内耗。建议在冲突后给自己足够的恢复时间，避免连续面对高压场景。",
    "dolphin": "需要承受他人负面情绪的情境对你消耗最大。你的共情能力让你很容易吸收他人的情绪，建议学习建立情绪边界。",
    "dog": "被拒绝或被忽视的情境对你消耗最大。你渴望被需要和被认可，当这种需求无法满足时会感到巨大的失落。",
    "cat": "被迫社交或失去个人空间的情境对你消耗最大。你需要独处来恢复能量，建议为自己争取足够的独处时间。",
    "wolf": "无法掌控局面的情境对你消耗最大。你习惯于主导，当失去控制感时会感到焦虑。",
    "bear": "无法保护重要的人的情境对你消耗最大。你的保护欲很强，当感到无力保护时会产生自责。",
    "fox": "被看透或被限制的情境对你消耗最大。你喜欢保持神秘感和灵活性，被约束会让你不适。",
    "owl": "被迫快速决策或情绪化场景对你消耗最大。你需要时间思考和观察，被催促会让你失去平衡。"
  };

  return drainMap[conflictAnimal] || "每个人都有自己的能量消耗模式，建议观察什么情境让你最疲惫，并主动调整。";
}

// 天赋点系统 - 根据动物人格计算不同能力维度的天赋值
function getTalentPoints(mainAnimal, subAnimal, situationAnimals) {
  // 定义每种动物在各天赋维度的基础分
  const animalTalents = {
    cat: { independence: 95, empathy: 45, leadership: 55, creativity: 80, resilience: 70, social: 35 },
    dog: { independence: 40, empathy: 85, leadership: 60, creativity: 55, resilience: 75, social: 90 },
    wolf: { independence: 85, empathy: 50, leadership: 95, creativity: 60, resilience: 90, social: 55 },
    fox: { independence: 75, empathy: 60, leadership: 65, creativity: 95, resilience: 80, social: 70 },
    deer: { independence: 50, empathy: 95, leadership: 40, creativity: 70, resilience: 55, social: 65 },
    bear: { independence: 70, empathy: 75, leadership: 85, creativity: 50, resilience: 95, social: 60 },
    owl: { independence: 90, empathy: 55, leadership: 70, creativity: 85, resilience: 65, social: 40 },
    dolphin: { independence: 45, empathy: 95, leadership: 55, creativity: 75, resilience: 60, social: 95 }
  };

  // 天赋维度定义
  const talentDefs = {
    independence: { name: '独立自主', icon: '🦅', color: '#8b5cf6', desc: '自我决策与独处的能力' },
    empathy: { name: '共情理解', icon: '💗', color: '#ec4899', desc: '感知他人情绪的能力' },
    leadership: { name: '领导魄力', icon: '👑', color: '#f59e0b', desc: '引领团队与决策的能力' },
    creativity: { name: '创意灵感', icon: '✨', color: '#06b6d4', desc: '思维创新与变通的能力' },
    resilience: { name: '抗压韧性', icon: '🛡️', color: '#10b981', desc: '面对压力的恢复能力' },
    social: { name: '社交魅力', icon: '🤝', color: '#6366f1', desc: '建立连接的亲和能力' }
  };

  // 计算综合天赋点 (主动物60% + 次级动物25% + 情境加成15%)
  const mainTalents = animalTalents[mainAnimal];
  const subTalents = animalTalents[subAnimal];

  // 情境动物加成
  const situationBonus = {};
  Object.keys(talentDefs).forEach(t => situationBonus[t] = 0);
  Object.values(situationAnimals).forEach(animal => {
    const talents = animalTalents[animal];
    Object.keys(talents).forEach(t => situationBonus[t] += talents[t] * 0.0375); // 15%/4情境
  });

  // 最终天赋点计算
  const finalTalents = {};
  Object.keys(talentDefs).forEach(t => {
    let score = mainTalents[t] * 0.6 + subTalents[t] * 0.25 + situationBonus[t];
    score = Math.min(99, Math.max(20, Math.round(score))); // 限制在20-99范围
    finalTalents[t] = { score, ...talentDefs[t] };
  });

  // 按分数排序，找出最强和最弱天赋
  const sorted = Object.entries(finalTalents).sort((a, b) => b[1].score - a[1].score);
  const topTalents = sorted.slice(0, 2);
  const growthTalent = sorted[sorted.length - 1];

  // 生成天赋解读
  const interpretations = {
    independence: {
      high: '叔本华说「只有当一个人独处时，他才是自由的」——你深谙这个道理。你拥有强大的内在力量，能够在孤独中自得其乐。你的独立不是逃避，而是一种主动选择的精神自治。不依赖他人的认可也能坚定前行，这份笃定是你最珍贵的内在资产',
      low: '亚里士多德说「人是社会性动物」——你的灵魂完美印证了这一点。你更享受与他人协作，在团队的共振中找到力量。独自承担可能让你感到孤单，但这不是缺陷，而是你天生懂得「连接」的价值。寻找志同道合的伙伴，会让你的能量成倍增长'
    },
    empathy: {
      high: '你是天生的情感探测器，像一面灵敏的湖水，能映照出他人内心最隐秘的涟漪。陀思妥耶夫斯基说「美将拯救世界」，而你的共情力就是一种美——它让你能敏锐感知他人的喜怒哀乐，在这个日渐冷硬的世界里，保持柔软是最稀缺的温柔天赋',
      low: '你更擅长用理性的棱镜折射世界，感性理解可以通过后天练习提升。笛卡尔说「我思故我在」——你的存在方式恰好如此。不必强迫自己成为一个「共情型」的人，你的理性之光照亮的路径同样珍贵，这不会削弱你的独特价值'
    },
    leadership: {
      high: '你天生具备引领他人的气场，像一座灯塔在风浪中稳定地发光。孙子说「将者，智信仁勇严」——你或许不全占，但关键时刻你能站出来做决策、扛责任的特质，让你成为团队中不可替代的主心骨。权力不会腐蚀你，因为你的领导力来自责任感而非控制欲',
      low: '老子说「上善若水」——你更适合像水一样在幕后默默滋养和支撑。你不需要站在聚光灯下也能创造巨大的价值。历史上最伟大的变革，往往是由那些不追求领袖头衔的人推动的。你的影响力是润物细无声的'
    },
    creativity: {
      high: '你的思维像一架万花筒——同样的碎片在你手中总能旋转出别人想不到的图案。达芬奇说「简单是终极的复杂」，而你恰好拥有把复杂世界简化成创意灵感的天赋。你总能从不同角度看问题，打破常规是你的拿手好戏，在别人看到墙壁的地方你看到的是还没打开的窗',
      low: '你更擅长执行和落地，像一位出色的建筑师——别人画蓝图，你让它从纸上站起来变成真实的建筑。稳扎稳打的风格让你成为最可靠的实践者。世界不缺空想家，缺的正是像你这样能把梦想变成现实的人'
    },
    resilience: {
      high: '尼采说「杀不死我的，使我更强大」——这简直是为你写的墓志铭（当然你还活得好好的）。你的心理韧性惊人，困难对你来说不是绊脚石而是磨刀石。你是典型的「反脆弱」人格，压力越大反弹越高，逆境反而能激发你最强的生命力',
      low: '你的内心像一件精密的瓷器——美丽、珍贵，也需要更用心地呵护。这份敏感让你比大多数人更能感知生活中细微的美好和疼痛。里尔克说「有何胜利可言，挺住意味着一切」——记得在压力下给自己更多温柔的关怀，你的敏感不是弱点，是天赋的另一面'
    },
    social: {
      high: '你天生自带社交光环，像一颗恒星自然而然地让周围的行星进入轨道。卡耐基说「一个人的成功，15%靠专业知识，85%靠人际关系」——你在这85%上有着得天独厚的优势。与人交往对你来说轻松自在，人脉是你的宝贵资源和快乐源泉',
      low: '庄子说「君子之交淡如水」——你更享受深度而非广度的社交。你不需要一百个点赞，只需要三五个真正懂你的灵魂。真正的知己胜过千万泛泛之交，你的社交哲学不是封闭，而是精挑细选后的深度投入'
    }
  };

  return {
    talents: finalTalents,
    topTalents,
    growthTalent,
    interpretations
  };
}

    document.body.removeChild(pdfContainer);

    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = canvas.width;
    const imgH = canvas.height;
    const pdfW = 210, pdfH = 297;
    let finalW = pdfW - 20;
    let finalH = finalW / (imgW / imgH);
    const pdf = new jsPDF('p', 'mm', 'a4');
    let remainingH = imgH;
    let srcY = 0;
    const pagePixelH = (pdfH - 20) / finalH * imgH;

    while (remainingH > 0) {
      const sliceH = Math.min(remainingH, pagePixelH);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = imgW;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
      const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
      const sliceFinalH = finalW / (imgW / sliceH);
      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, sliceFinalH);
      srcY += sliceH;
      remainingH -= sliceH;
    }
