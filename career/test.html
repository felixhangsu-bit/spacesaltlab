<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职业性格测评 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #8b5cf6;
  --primary-dark: #7c3aed;
  --primary-light: #a78bfa;
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.025);
  --card-border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.07);
  --accent: rgba(139,92,246,0.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-weight: 300; }
.noise { position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }
#testPage { background: var(--bg); padding: 20px; }
.test-container { max-width: 700px; margin: 0 auto; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 8px 12px; border-radius: 0; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
.back-btn:hover { border-color: rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.progress-wrap { text-align: right; }
.progress-text { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 40px; position: relative; overflow: hidden; }
.question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #8b5cf6, #7c3aed, #a78bfa); }
.dim-tag { display: inline-block; padding: 6px 14px; border-radius: 0; font-size: 12px; font-weight: 500; margin-bottom: 16px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.q-num { font-size: 13px; color: var(--accent); margin-bottom: 10px; font-family: 'EB Garamond', serif; letter-spacing: 3px; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 32px; font-family: 'Noto Serif SC', serif; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; transition: all 0.2s; }
.opt:hover { border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.04); }
.opt.selected { border-color: rgba(139,92,246,0.6); background: rgba(139,92,246,0.08); }
.opt-radio { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-text { font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.45); }
.opt.selected .opt-text { color: var(--text); }
.nav-btns { display: flex; justify-content: space-between; margin-top: 28px; }
.nav-btn { padding: 12px 28px; border-radius: 0; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.nav-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.nav-btn.secondary:hover { border-color: rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.nav-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.nav-btn.primary:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.6); }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#resultPage { background: var(--bg); }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.result-header { text-align: center; color: var(--text); padding: 40px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.result-header h1 { font-size: 28px; margin-bottom: 8px; font-family: 'Noto Serif SC', serif; font-weight: 700; color: var(--text); }
.result-header p { color: var(--text-muted); font-family: 'EB Garamond', serif; letter-spacing: 3px; font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 32px; margin-bottom: 20px; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #8b5cf6, #7c3aed, #a78bfa); }
.section-icon { width: 44px; height: 44px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-family: 'Noto Serif SC', serif; color: var(--text); }
.type-badge { display: inline-block; padding: 8px 20px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); border-radius: 0; font-size: 13px; font-weight: 500; margin-bottom: 14px; font-family: 'EB Garamond', serif; letter-spacing: 3px; }
.type-name { font-size: 28px; font-weight: 700; margin-bottom: 12px; font-family: 'Noto Serif SC', serif; background: linear-gradient(135deg, #8b5cf6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.type-desc { color: rgba(255,255,255,0.45); font-size: 15px; line-height: 1.8; font-weight: 300; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
.stat-card { padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; text-align: center; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--primary); font-family: 'EB Garamond', serif; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.dim-item { margin-bottom: 20px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dim-name { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.dim-icon { width: 28px; height: 28px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.dim-score { font-weight: 600; color: var(--primary); font-family: 'EB Garamond', serif; }
.dim-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; margin-bottom: 12px; position: relative; }
.dim-bar-fill { height: 100%; border-radius: 0; transition: width 0.5s; }
.dim-bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.15); }
.dim-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); font-family: 'EB Garamond', serif; letter-spacing: 1px; }
.dim-analysis { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 0; }
.career-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
.career-item { padding: 14px; background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 0; font-size: 14px; text-align: center; }
.strength-list { margin-top: 16px; }
.strength-item { display: flex; gap: 12px; margin-bottom: 12px; padding: 14px; background: rgba(52,211,153,0.05); border: 1px solid rgba(52,211,153,0.15); border-radius: 0; }
.strength-icon { font-size: 20px; }
.weakness-item { background: rgba(248,113,113,0.05); border-color: rgba(248,113,113,0.15); }
.celeb-box { display: flex; gap: 20px; align-items: center; padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; margin-top: 16px; }
.celeb-avatar { width: 70px; height: 70px; background: linear-gradient(135deg, #8b5cf6, #7c3aed); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.celeb-info h4 { font-size: 16px; margin-bottom: 4px; font-family: 'Noto Serif SC', serif; }
.celeb-info p { font-size: 13px; color: var(--text-muted); line-height: 1.6; font-weight: 300; }
.tip-item { display: flex; gap: 14px; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; margin-bottom: 10px; border-left: 2px solid var(--primary); }
.tip-num { width: 26px; height: 26px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; font-family: 'EB Garamond', serif; }
.tip-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; font-weight: 300; }
.download-section { text-align: center; padding: 32px; }
.download-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.download-btn:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.6); }
.restart-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 0; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.restart-btn:hover { border-color: rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading.show { opacity: 1; visibility: visible; }
.loading-box { background: #111; border: 1px solid var(--border); padding: 36px; border-radius: 0; text-align: center; }
.spinner { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-content { background: #111; border: 1px solid var(--border); padding: 36px; border-radius: 0; max-width: 400px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s; }
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-size: 22px; font-weight: 700; margin-bottom: 12px; font-family: 'Noto Serif SC', serif; background: linear-gradient(135deg, #8b5cf6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.modal-content > p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 20px; font-weight: 300; }
.modal-tests { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; padding: 16px; margin-bottom: 16px; }
.modal-test-item { padding: 10px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); }
.modal-test-item:last-child { border-bottom: none; }
.modal-tip { font-size: 13px; color: var(--primary); font-weight: 500; margin-bottom: 20px; }
.modal-buttons { display: flex; flex-direction: column; gap: 10px; }
.modal-btn { padding: 14px 24px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.modal-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.more-tests-btn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: rgba(251,191,36,0.8); }
@media (max-width: 640px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .career-grid { grid-template-columns: 1fr; }
  .celeb-box { flex-direction: column; text-align: center; }
  .question-card { padding: 28px 20px; }
  .q-text { font-size: 18px; }
}
</style>
</head>
<body>
<div class="noise"></div>

<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="exitTest()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        退出测试
      </button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 60</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag" style="display:none">能量来源</div>
      <div class="q-num">问题 <span id="qNum">1</span></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prevQ()">上一题</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">下一题</button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container">
    <div class="result-header">
      <h1>💼 职业性格测评报告</h1>
      <p>宇宙认知盐究所 · Space Salt Lab</p>
    </div>
    <div id="resultContent"></div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>正在生成报告...</p>
  </div>
</div>

<script>
// 60道MBTI测评题目
const questions = [
  // E-I 能量来源 (15题)
  { dim: 'EI', text: '一场理想的晚餐，桌上坐着几个人？', options: ['越多越好，热闹是一种能量', '两三个就够，话要说进心里才算数'] },
  { dim: 'EI', text: '你被困在一座空旷的图书馆里整整一天，出来后你最想做什么？', options: ['立刻打电话给朋友，约出来聊聊', '回家泡杯茶，享受这份余韵'] },
  { dim: 'EI', text: '一个困扰你的难题，你更可能怎么解决？', options: ['找个人边走边聊，说着说着就有思路了', '关上门，在纸上画画写写，等灵光乍现'] },
  { dim: 'EI', text: '如果你的房间有一扇窗，你更希望窗外是什么？', options: ['一条热闹的步行街，人来人往', '一片安静的湖面，偶尔有鸟掠过'] },
  { dim: 'EI', text: '做一道菜的过程中，你更享受哪个环节？', options: ['一群人在厨房里手忙脚乱的那种默契', '自己一个人安静地切菜、调味的专注'] },
  { dim: 'EI', text: '你意外获得了一张演唱会门票，你会？', options: ['赶紧找人一起去，好东西要分享', '一个人去也挺好，反正是去听歌的'] },
  { dim: 'EI', text: '连续参加三天的行业峰会后，你的状态更接近？', options: ['像被充了电，认识了好多有趣的人', '像被榨干了，需要独自待着恢复元气'] },
  { dim: 'EI', text: '如果思考是一条河，你的河更像什么？', options: ['一条有很多支流汇入的大河，越聊越宽', '一口深井，越往下越安静，越接近答案'] },
  { dim: 'EI', text: '你的理想咖啡馆是什么样的？', options: ['有公共长桌，随时可能跟陌生人聊起来', '有角落的单人卡座，戴上耳机就是自己的世界'] },
  { dim: 'EI', text: '搬到一个新城市，第一周你更可能做什么？', options: ['去社区活动、酒吧或兴趣小组认识新朋友', '先独自走遍附近的街道，建立自己的地图'] },
  { dim: 'EI', text: '你的手机通讯录里，哪种联系人更多？', options: ['认识但不算深交的朋友，各行各业都有', '数量不多，但每一个都可以凌晨打电话'] },
  { dim: 'EI', text: '被邀请上台即兴讲几句话，你的第一反应是？', options: ['有点兴奋，这种场合让人来劲', '胃微微一紧，心想为什么不能让我写下来'] },
  { dim: 'EI', text: '面前有一个岔路口，一条路通向集市，一条通向山顶，你走哪条？', options: ['集市——热闹的地方总能遇到有意思的事', '山顶——安静的地方才能看清全貌'] },
  { dim: 'EI', text: '你的精力像什么？', options: ['火——需要人群来添柴，越烧越旺', '电池——需要独处来充电，满了才能输出'] },
  { dim: 'EI', text: '手机突然响了，屏幕显示一个不太熟的号码，你？', options: ['直接接，说不定有什么新鲜事', '盯着屏幕等它停，心想发条微信不好吗'] },

  // S-N 信息获取 (15题)
  { dim: 'SN', text: '学做一道新菜，你更倾向于？', options: ['严格按照食谱的克数和步骤来', '大概看一遍就开始，凭感觉调整'] },
  { dim: 'SN', text: '读一本小说，你更容易记住什么？', options: ['主角穿了什么颜色的衣服、在哪条街转了弯', '整个故事让你想到了自己的某段经历'] },
  { dim: 'SN', text: '迷路时，你更相信什么？', options: ['手机地图上的实时导航', '一种说不清的方向感，觉得应该往那边走'] },
  { dim: 'SN', text: '逛博物馆时，你的目光更容易停在？', options: ['展品旁边的年代标注和工艺说明', '某件展品引发的一连串联想和遐想'] },
  { dim: 'SN', text: '别人跟你描述一个新项目，你最先想知道？', options: ['具体要做什么、截止日期是几号', '这件事的意义是什么、可能带来什么改变'] },
  { dim: 'SN', text: '站在窗前看一棵树，你更容易注意到？', options: ['树叶的形状、树干的纹理、枝条的朝向', '这棵树经历了多少个冬天，像不像某种隐喻'] },
  { dim: 'SN', text: '修理一件坏掉的东西，你会怎么做？', options: ['找到说明书或教程，按步骤排查', '凭直觉拆开看看，多半能猜到哪里出了问题'] },
  { dim: 'SN', text: '如果人生是一张地图，你更关心？', options: ['自己现在站在哪个坐标上', '地图之外还有没有未标注的大陆'] },

function render() {
  const q = questions[idx];
  const info = dimInfo[q.dim];
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx + 1) / 60 * 100) + '%';
  document.getElementById('dimTag').textContent = info.name;
  document.getElementById('dimTag').style.background = info.bg;
  document.getElementById('dimTag').style.color = info.color;
  document.getElementById('qText').textContent = q.text;

  let optHtml = '';
  q.options.forEach((opt, i) => {
    const selected = answers[idx] === i ? 'selected' : '';
    optHtml += `<div class="opt ${selected}" onclick="select(${i})"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
  });
  document.getElementById('options').innerHTML = optHtml;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === 59 ? '查看结果' : '下一题';
}

function select(v) { answers[idx] = v; render(); if (idx < 59) setTimeout(() => nextQ(), 250); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() {
  if (answers[idx] === null) { alert('请先选择一个选项'); return; }
  if (idx < 59) { idx++; render(); } else showResult();
}

function calcScores() {
  const scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  answers.forEach((v, i) => {
    if (v === 1) scores[dims[i]]++;
  });
  return scores;
}

function getType(scores) {
  let type = '';
  type += scores.EI < 8 ? 'E' : 'I';
  type += scores.SN < 8 ? 'S' : 'N';
  type += scores.TF < 8 ? 'T' : 'F';
  type += scores.JP < 8 ? 'J' : 'P';
  return type;
}

        sliceCanvas.height = sliceH;
        sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
        const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
        if (srcY > 0) pdf.addPage();
        pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, finalW / (imgW / sliceH));
        srcY += sliceH;
        remainingH -= sliceH;
      }
    }

    pdf.save(`职业性格测评报告_${typeKey}_${date}.pdf`);
  } catch (e) {
    console.error(e);
    alert('PDF生成失败，请稍后重试');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告';
    loading.classList.remove('show');
  }
}

render();
</script>
</body>
</html>
