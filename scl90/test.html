<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理状态评估 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/test-common.css">
<style>
/* SCL-90 specific variables */
:root {
  --gradient: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #c084fc 100%);
  --gradient-warm: linear-gradient(135deg, #8b5cf6 0%, #f472b6 100%);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

/* SCL-90 specific: dimension tag */
.dim-tag { display: inline-block; padding: 6px 14px; border-radius: 0; font-size: 12px; font-weight: 500; margin-bottom: 16px; }

/* SCL-90 specific: status cards */
.status-card { text-align: center; padding: 28px; border-radius: 0; margin-bottom: 20px; position: relative; }
.status-card.stable { background: rgba(5,150,115,0.1); border: 1px solid rgba(5,150,115,0.15); }
.status-card.attention { background: rgba(217,119,6,0.1); border: 1px solid rgba(217,119,6,0.15); }
.status-card.risk { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.15); }
.status-label { font-family: 'EB Garamond', serif; font-size: 14px; margin-bottom: 8px; color: var(--text-muted); letter-spacing: 3px; }
.status-value { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; }
.status-card.stable .status-value { color: #6ee7b7; }
.status-card.attention .status-value { color: #fde68a; }
.status-card.risk .status-value { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.status-philosophy { font-size: 13px; margin-top: 12px; color: rgba(255,255,255,0.45); font-style: italic; line-height: 1.6; }

/* SCL-90 specific: chart wrap */
.chart-wrap { max-width: 400px; margin: 0 auto; }

/* SCL-90 specific: dimension hover effect */
.dim-item:hover { border-color: rgba(139,92,246,0.2); transform: translateY(-1px); }

/* SCL-90 specific: level badges */
.level-badge { padding: 4px 10px; border-radius: 0; font-size: 12px; font-weight: 500; letter-spacing: 1px; }
.level-high { background: rgba(5,150,115,0.12); color: #6ee7b7; }
.level-medium { background: rgba(217,119,6,0.12); color: #fde68a; }
.level-low { background: rgba(139,92,246,0.12); color: #c4b5fd; }

/* SCL-90 specific: dimension metaphor */
.dim-metaphor { font-family: 'EB Garamond', serif; font-size: 13px; color: rgba(139,92,246,0.55); font-style: italic; margin-top: 6px; padding-left: 42px; letter-spacing: 0.5px; }

/* SCL-90 specific: summary text */
.summary-text { font-size: 15px; color: var(--text-muted); line-height: 1.8; }

/* SCL-90 specific: tip source */
.tip-source { font-family: 'EB Garamond', serif; font-size: 12px; color: rgba(139,92,246,0.55); margin-top: 4px; font-style: italic; letter-spacing: 0.5px; }

/* SCL-90 specific: warning section */
.warning-section { background: rgba(139,92,246,0.05); border: 1px solid rgba(139,92,246,0.1); border-radius: 0; padding: 16px; margin-top: 16px; }
.warning-section h4 { color: #c4b5fd; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.warning-section p { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; }

/* SCL-90 specific: philosophy card */
.philosophy-card { background: var(--card); border: 1px solid var(--border); border-radius: 0; padding: 28px; margin-bottom: 20px; text-align: center; position: relative; }
.philosophy-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
.philosophy-card .phi-icon { font-size: 36px; margin-bottom: 12px; }
.philosophy-card h3 { font-family: 'Noto Serif SC', serif; font-size: 18px; color: var(--text); margin-bottom: 16px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.philosophy-card .phi-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }
.philosophy-card .phi-quote { font-family: 'EB Garamond', serif; font-style: italic; color: rgba(255,255,255,0.6); margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; font-size: 14px; letter-spacing: 0.5px; }
.philosophy-card .phi-author { font-family: 'EB Garamond', serif; font-size: 13px; color: rgba(139,92,246,0.55); margin-top: 6px; letter-spacing: 1px; }

/* SCL-90 specific: remember card */
.remember-card { background: rgba(5,150,115,0.05); border-radius: 0; padding: 28px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(5,150,115,0.12); }
.remember-card .rem-icon { font-size: 32px; margin-bottom: 10px; }
.remember-card h3 { font-family: 'Noto Serif SC', serif; font-size: 17px; color: #6ee7b7; margin-bottom: 12px; }
.remember-card p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.8; }
.remember-card .rem-quote { font-family: 'EB Garamond', serif; font-style: italic; margin-top: 12px; color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.5px; }

/* SCL-90 specific: decorative dots */
.decorative-dots { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; }
.decorative-dots span { width: 6px; height: 6px; border-radius: 50%; opacity: 0.2; }

/* SCL-90 specific: action buttons */
.action-btns { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.restart-btn { flex: 1; min-width: 140px; padding: 14px 20px; border-radius: 0; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; letter-spacing: 2px; }
.restart-btn.primary { background: var(--primary); border: none; color: white; }
.restart-btn.primary:hover { background: var(--primary-dark); box-shadow: 0 10px 30px rgba(139,92,246,0.2); }
.restart-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
.restart-btn.secondary:hover { border-color: var(--primary); }

/* SCL-90 specific: modal overrides */
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-btn.secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); }

/* SCL-90 specific: result header overrides */
.result-header { padding-top: 20px; }
.result-header h1 { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-header p { color: var(--text-muted); font-size: 14px; letter-spacing: 2px; }
.result-header .subtitle-quote { font-family: 'EB Garamond', serif; font-style: italic; color: rgba(255,255,255,0.25); font-size: 14px; margin-top: 8px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="noise"></div>

<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="if(confirm('确定要退出吗？'))location.href='index.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回
      </button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 45</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2.2%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag" style="display:none;background:#1e3a5f;color:#60a5fa">躯体化</div>
      <div class="q-num">第 <span id="qNum">1</span> 题</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prev()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          上一题
        </button>
        <button class="nav-btn primary" id="nextBtn" onclick="next()" disabled>
          下一题
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container" id="resultContent"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div style="color:var(--text-muted)">正在生成报告...</div>
</div>

<script>
// 45题SCL-90精简版，每个因子5题
const questions = [
  // 躯体化 (5题)
  { dim: 'som', text: '最近一周，你的身体有没有在某些时刻突然「说话」——比如头部发紧、胃里搅动、或者肩膀不自觉地缩起来？' },
  { dim: 'som', text: '最近一周，有没有在安静的时候突然感觉到心跳，好像它在提醒你什么事情？' },
  { dim: 'som', text: '最近一周，身体某些地方会不会偶尔出现一种说不清的异样感——像被轻轻电了一下，或者皮肤在微微发麻？' },
  { dim: 'som', text: '最近一周，有没有过那种胸口像被什么东西轻轻压住的感觉，深呼吸的时候不太顺畅？' },
  { dim: 'som', text: '最近一周，下班或放学后，你的身体是像卸下了背包一样轻松，还是像一块被拧干的毛巾？' },
  // 强迫症状 (5题)
  { dim: 'obs', text: '最近一周，出门后你有没有走到半路又折回去确认门锁好了、煤气关了，哪怕心里知道已经检查过了？' },
  { dim: 'obs', text: '最近一周，面对两个选项的时候，你会不会在脑子里来来回回地反复权衡，最后反而什么都没选？' },
  { dim: 'obs', text: '最近一周，有没有某个念头像一首洗脑歌一样不断在脑海里自动播放，你越想忽略它它越响？' },
  { dim: 'obs', text: '最近一周，你会不会觉得有些事情「必须」按照某种顺序或方式来做，否则心里就会很不舒服？' },
  { dim: 'obs', text: '最近一周，有没有因为一个很小的疏忽（比如打错一个字）而反复纠结，觉得自己不该犯这种错？' },
  // 人际敏感 (5题)
  { dim: 'int', text: '最近一周，你有没有跟人说了一段话之后，回去在脑海里反复回放，觉得自己是不是说错了什么？' },
  { dim: 'int', text: '最近一周，走进一个有很多人的房间时，你是自然地融入，还是会先在心里做一番「准备工作」？' },
  { dim: 'int', text: '最近一周，刷朋友圈或社交媒体的时候，有没有一个瞬间觉得别人的生活都在闪闪发光，而自己的有点暗淡？' },
  { dim: 'int', text: '最近一周，如果有人看了你一眼但没打招呼，你第一反应是「对方没注意到我」，还是「我是不是哪里得罪了他」？' },
  { dim: 'int', text: '最近一周，有没有感觉到有些人对你说话的语气不太一样，虽然可能只是你的错觉？' },
  // 抑郁 (5题)
  { dim: 'dep', text: '最近一周，早晨醒来的那一刻，你的第一个感觉是「新的一天」，还是「又一天」？' },
  { dim: 'dep', text: '最近一周，有没有一件以前让你眼睛发亮的事情，现在看起来变得灰蒙蒙的？' },
  { dim: 'dep', text: '最近一周，如果有人问你「你对未来怎么看」，你脑海里浮现的画面是清晰的还是模糊的？' },
  { dim: 'dep', text: '最近一周，有没有某个安静的瞬间，突然觉得自己像一件放在角落里被遗忘的物品？' },
  { dim: 'dep', text: '最近一周，有没有毫无缘由地，眼眶就湿了——可能是因为一首歌、一句话，也可能什么都没有？' },
  // 焦虑 (5题)
  { dim: 'anx', text: '最近一周，有没有那种「说不上来哪里不对，但身体就是放松不下来」的感觉？' },
  { dim: 'anx', text: '最近一周，坐在椅子上的时候，你能安安静静地坐住，还是会不自觉地抖腿、搓手、或者动来动去？' },
  { dim: 'anx', text: '最近一周，有没有在某个普通的场景里突然感到一阵恐惧，好像有什么坏事要发生——但其实什么都没有？' },
  { dim: 'anx', text: '最近一周，一个突然的声响——比如手机铃声、关门声——会不会让你的心猛地一跳？' },
  { dim: 'anx', text: '最近一周，有没有一种持续的担忧，像背景音乐一样一直在播放，虽然你说不清到底在担心什么？' },
  // 敌对 (5题)
  { dim: 'hos', text: '最近一周，有没有因为一件很小的事——比如排队被插队、外卖送晚了——而感到异常恼火？' },
  { dim: 'hos', text: '最近一周，如果有人让你不高兴了，你脑海里会不会闪过一些很激烈的画面或者念头？' },
  { dim: 'hos', text: '最近一周，你和身边的人说话时，是否比平时更容易「话赶话」，一不小心就变成了争论？' },
  { dim: 'hos', text: '最近一周，有没有那种一根弦绷得很紧的感觉，一点点不顺心就觉得要断掉？' },
  { dim: 'hos', text: '最近一周，有没有想把手里的东西重重摔下去的冲动，哪怕那东西没有做错什么？' },
  // 恐惧 (5题)
  { dim: 'pho', text: '最近一周，走在一个特别空旷的地方——比如大广场、长走廊——你会不会有一种莫名的不安？' },
  { dim: 'pho', text: '最近一周，在拥挤的地铁或公交上，你是随遇而安，还是会有一种「被困住了」的感觉？' },
  { dim: 'pho', text: '最近一周，夜晚独自待在家里的时候，你是感到安宁，还是会莫名地竖起耳朵听动静？' },
  { dim: 'pho', text: '最近一周，在人特别多的商场、集会或演唱会，你会不会有种想马上离开的冲动？' },
  { dim: 'pho', text: '最近一周，有没有某个特定的东西——比如某种动物、某个场景、某种声音——每次遇到都让你心跳加速想回避？' },
  // 偏执 (5题)
  { dim: 'par', text: '最近一周，走进一个大家正在笑的房间时，你会不会有一瞬间觉得他们可能在笑你？' },
  { dim: 'par', text: '最近一周，有没有觉得某些人对你特别好的时候，你反而会想「他是不是有什么目的」？' },
  { dim: 'par', text: '最近一周，你觉得身边的大多数人是值得信任的，还是心里总有一个声音说「小心点」？' },
  { dim: 'par', text: '最近一周，有没有感觉有人在有意无意地关注你的行为，或者在你背后谈论你？' },
  { dim: 'par', text: '最近一周，当事情不顺利的时候，你的第一反应是「运气不好」，还是「有人在故意为难我」？' },
  // 现实感稳定性 (5题)
  { dim: 'psy', text: '最近一周，有没有某个瞬间觉得脑子里的想法像脱缰的马，你只能看着它们跑，却拉不住缰绳？' },
  { dim: 'psy', text: '最近一周，即使身边有很多人，你有没有感觉到一种透明的隔板把你和他们隔开了？' },
  { dim: 'psy', text: '最近一周，有没有一种内心空荡荡的感觉，像一间搬走了所有家具的房间？' },
  { dim: 'psy', text: '最近一周，有没有看着镜子里的自己，突然觉得那个人有点陌生——明明是自己，但又不太确定？' },
  { dim: 'psy', text: '最近一周，有没有走在熟悉的路上，却突然觉得周围的一切像电影布景一样不太真实？' }
];

const dimInfo = {
  'som': { name: '身体信号', icon: '🌊', bg: '#1e3a5f', color: '#60a5fa' },
  'obs': { name: '思维漩涡', icon: '🔮', bg: '#422006', color: '#fbbf24' },
  'int': { name: '人际雷达', icon: '🪞', bg: '#4a1942', color: '#f472b6' },
  'dep': { name: '情绪色温', icon: '🌒', bg: '#1e1b4b', color: '#818cf8' },
  'anx': { name: '内在天气', icon: '🌪️', bg: '#450a0a', color: '#f87171' },
  'hos': { name: '火焰信号', icon: '🔥', bg: '#431407', color: '#fb923c' },
  'pho': { name: '避风本能', icon: '🦋', bg: '#064e3b', color: '#34d399' },
  'par': { name: '信任罗盘', icon: '🧭', bg: '#3b0764', color: '#c084fc' },
  'psy': { name: '现实锚点', icon: '🌌', bg: '#164e63', color: '#22d3ee' }
};

const optionLabels = ['完全没有', '偶尔一闪而过', '时不时会出现', '经常如此', '几乎一直都是'];

let idx = 0;
let answers = new Array(45).fill(null);
const dims = questions.map(q => q.dim);

function render() {
  const q = questions[idx];
  const info = dimInfo[q.dim];
  document.getElementById('dimTag').textContent = info.name;
  document.getElementById('dimTag').style.background = info.bg;
  document.getElementById('dimTag').style.color = info.color;
  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = ((idx + 1) / 45 * 100) + '%';

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  optionLabels.forEach((label, i) => {
    const opt = document.createElement('div');
    opt.className = 'opt' + (answers[idx] === i ? ' selected' : '');
    opt.innerHTML = `<div class="opt-radio"></div><div class="opt-text">${label}</div>`;
    opt.onclick = () => selectOption(i);
    optDiv.appendChild(opt);
  });

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = answers[idx] === null;
  document.getElementById('nextBtn').textContent = idx === 44 ? '查看结果' : '下一题';
}

function selectOption(val) {
  answers[idx] = val;
  render();
  if (idx < 44) setTimeout(() => next(), 300);
  else setTimeout(() => next(), 300);
}

function prev() { if (idx > 0) { idx--; render(); } }

function next() {
  if (answers[idx] === null) return;
  if (idx < 44) { idx++; render(); }
  else { showResult(); }
}

function getNavButtons() {
  const source = sessionStorage.getItem('user_source');
  if (source === 'platform') {
    return '<button class="restart-btn secondary" onclick="location.href=\'../platform.html\'">返回测评中心</button>';
  } else {
    return '<button class="restart-btn secondary" onclick="showMoreTests()">更多测试</button>';
  }
}

function showMoreTests() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-content">
      <div class="modal-icon">🧂</div>
      <h3>更多专业测评</h3>
      <p>请在宇宙认知盐究所购买其他测试哦~</p>
      <div class="modal-buttons">
        <button class="modal-btn primary" onclick="closeModal()">知道了</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  setTimeout(() => modal.classList.add('show'), 10);
}

function closeModal() {
  const modal = document.querySelector('.modal-overlay');
  if (modal) { modal.classList.remove('show'); setTimeout(() => modal.remove(), 300); }
}

function calcScores() {
  const scores = { som: 0, obs: 0, int: 0, dep: 0, anx: 0, hos: 0, pho: 0, par: 0, psy: 0 };
  answers.forEach((v, i) => { scores[dims[i]] += v; });
  return scores;
}

function getOverallStatus(total) {
  if (total <= 45) return {
    level: '内心天气：晴',
    class: 'stable',
    color: '#059669',

function getDimLevel(score) {
  if (score <= 5) return { level: '平静', class: 'level-high', color: '#059669' };

}

function getPhilosophySection(scores) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const topDims = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 2);

  let text = '';
  let quote = '';
  let author = '';

  if (total <= 45) {
    text = '从哲学的角度看，你当前的状态接近于佛学中所说的「正念」——不是没有烦恼，而是能与烦恼共处而不被淹没。斯多亚学派的哲学家爱比克泰德说过：真正的自由不是控制外在世界，而是掌握自己内在的反应。你正在做到这一点。';

    author = '—— 改编自斯多亚哲学';
  } else if (total <= 90) {
    const dimNames = topDims.map(([d]) => dimInfo[d].name).join('和');
    text = `你的「${dimNames}」维度信号比较活跃。从心理哲学的视角看，这些不适不是毫无意义的——荣格相信，每一种心理症状都是灵魂试图自我疗愈的尝试。你内心的不安可能正在推动你走向一个更深层的自我理解。`;
    quote = '「人最大的发现之一，就是意识到自己可以通过改变内在态度来改变外在生活。」';
    author = '—— 威廉·詹姆斯（心理学之父）';
  } else {
    text = '你正在经历的，许多伟大的思想者也曾经历过。叔本华在深重的忧郁中写出了对意志的深刻洞察，荣格在精神崩溃的边缘完成了《红书》，佛陀正是因为看见了「苦」才走上了觉悟之路。你的痛苦不是终点，它可能是一扇门——但请不要独自穿过它。';
    quote = '「在你最黑暗的时刻，你要做的不是寻找光明，而是敢于成为黑暗中的一盏灯。」';
    author = '—— 改编自荣格《红书》';

  return { text, quote, author };

          max: 20,
          ticks: { stepSize: 5, color: 'rgba(255,255,255,0.25)', backdropColor: 'transparent' },
          pointLabels: { color: 'rgba(255,255,255,0.6)', font: { size: 12, family: 'Noto Sans SC' } },
          grid: { color: 'rgba(255,255,255,0.05)' },
          angleLines: { color: 'rgba(255,255,255,0.05)' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

async function downloadPDF() {
  const btn = event.target.closest('button');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  btn.innerHTML = '生成中...';
  loading.classList.add('show');

  try {
    const { jsPDF } = window.jspdf;
    const content = document.getElementById('resultContent');

    // 等待图表完全渲染
    await new Promise(r => setTimeout(r, 500));

    const canvas = await html2canvas(content, {
      scale: 2,
      useCORS: true,
      logging: false,
      backgroundColor: '#0a0a0a',
      height: content.scrollHeight,
      windowHeight: content.scrollHeight
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pdfWidth - 20;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
    heightLeft -= (pdfHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
      heightLeft -= (pdfHeight - 20);
    }

    const date = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
    pdf.save(`心理状态探索报告_${date}.pdf`);
  } catch (e) {
    console.error(e);
    alert('PDF生成失败');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告';
    loading.classList.remove('show');
  }
}

render();
</script>
