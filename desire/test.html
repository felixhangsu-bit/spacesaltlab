<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欲望比重测试 | 宇宙认知盐究所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary: #8b5cf6;
  --primary-dark: #7c3aed;
  --primary-light: #a78bfa;
  --gradient: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.025);
  --card-border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.38);
  --text-dim: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.07);
  --accent: rgba(139,92,246,0.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-weight: 300; position: relative; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }

/* Noise overlay */
.noise { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }

/* Ambient orbs */
#testPage::before, #resultPage::before {
  content: ''; position: fixed; top: -20%; left: -10%; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#testPage::after, #resultPage::after {
  content: ''; position: fixed; bottom: -20%; right: -10%; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* 测试页 */
#testPage { background: var(--bg); padding: 20px; position: relative; }
.test-container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-muted); font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 300; cursor: pointer; padding: 8px 12px; border-radius: 0; transition: all 0.2s; letter-spacing: 1px; }
.back-btn:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.progress-wrap { text-align: right; }
.progress-text { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 40px; position: relative; overflow: hidden; }
.question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #8b5cf6, #7c3aed, #a78bfa); }
.q-num { font-size: 13px; color: var(--accent); margin-bottom: 10px; font-family: 'EB Garamond', serif; letter-spacing: 3px; text-transform: uppercase; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 32px; color: rgba(255,255,255,0.88); font-family: 'Noto Serif SC', serif; }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid rgba(255,255,255,0.07); border-radius: 0; cursor: pointer; transition: all 0.2s; background: transparent; }
.opt:hover { border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.04); }
.opt.selected { border-color: rgba(139,92,246,0.6); background: rgba(139,92,246,0.08); }
.opt-radio { width: 22px; height: 22px; border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-text { font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.65); }
.opt.selected .opt-text { color: rgba(255,255,255,0.88); }
.nav-btns { display: flex; gap: 12px; margin-top: 32px; }
.nav-btn { flex: 1; padding: 14px; border-radius: 0; font-size: 14px; font-weight: 400; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; letter-spacing: 2px; }
.nav-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.38); }
.nav-btn.secondary:hover { border-color: rgba(139,92,246,0.4); color: rgba(255,255,255,0.6); }
.nav-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.nav-btn.primary:hover { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.6); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* 结果页 */
#resultPage { background: #0a0a0a; position: relative; }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
.result-header { text-align: center; margin-bottom: 40px; }
.result-logo { font-size: 64px; margin-bottom: 16px; }
.result-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; font-family: 'Noto Serif SC', serif; background: linear-gradient(135deg, #ddd6fe, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-subtitle { color: var(--text-muted); font-size: 15px; font-weight: 300; }
.card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 0; padding: 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #8b5cf6, #7c3aed, #a78bfa); }
.section-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; margin-bottom: 20px; color: rgba(255,255,255,0.88); font-family: 'Noto Serif SC', serif; }
.section-icon { width: 36px; height: 36px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); }

/* 类型卡片 */
.type-main { padding: 24px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; margin-bottom: 20px; text-align: center; }
.type-icon { font-size: 56px; margin-bottom: 12px; }
.type-name { font-size: 24px; font-weight: 700; margin-bottom: 8px; font-family: 'Noto Serif SC', serif; background: linear-gradient(135deg, #ddd6fe, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.type-subtitle { font-size: 14px; color: rgba(139,92,246,0.7); margin-bottom: 16px; font-weight: 300; }
.type-desc { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.7; text-align: left; font-weight: 300; }

/* 雷达图 */
.chart-container { height: 320px; margin: 20px 0; }

/* 维度分析 */
.dim-item { padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 0; margin-bottom: 12px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.dim-name { display: flex; align-items: center; gap: 10px; font-weight: 400; color: rgba(255,255,255,0.7); }
.dim-icon { width: 32px; height: 32px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(255,255,255,0.04); }
.dim-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 0; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 0; transition: width 0.5s; }
.dim-level { font-size: 13px; padding: 4px 12px; border-radius: 0; border: 1px solid rgba(255,255,255,0.1); }

/* 冲突分析 */
.conflict-box { padding: 20px; background: rgba(139,92,246,0.04); border-left: 2px solid rgba(139,92,246,0.4); border-radius: 0; margin-top: 20px; }
.conflict-title { font-weight: 600; color: rgba(139,92,246,0.8); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: 'Noto Serif SC', serif; }
.conflict-content { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.7; font-weight: 300; }

/* 被压抑欲望 */
.suppressed-box { padding: 20px; background: rgba(139,92,246,0.04); border-left: 2px solid rgba(139,92,246,0.4); border-radius: 0; margin-top: 20px; }
.suppressed-title { font-weight: 600; color: rgba(139,92,246,0.8); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: 'Noto Serif SC', serif; }
.suppressed-content { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.7; font-weight: 300; }

/* 建议 */
.tip-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.tip-item:last-child { border-bottom: none; }
.tip-num { width: 28px; height: 28px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(139,92,246,0.8); font-size: 14px; font-weight: 600; flex-shrink: 0; }
.tip-text { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; font-weight: 300; }

/* 风险提醒 */
.risk-box { padding: 20px; background: rgba(255,77,77,0.04); border-left: 2px solid rgba(255,77,77,0.3); border-radius: 0; margin-top: 20px; }
.risk-title { font-weight: 600; color: rgba(255,120,120,0.8); margin-bottom: 8px; font-family: 'Noto Serif SC', serif; }
.risk-content { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; font-weight: 300; }

/* 按钮 */
.action-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 32px; }
.action-btn { flex: 1; min-width: 140px; padding: 16px 24px; border-radius: 0; font-size: 14px; font-weight: 400; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 2px; }
.action-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }
.action-btn.primary:hover { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.6); }
.action-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.38); }
.restart-btn { background: transparent; border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.38); padding: 16px 24px; border-radius: 0; font-size: 14px; font-weight: 400; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
.restart-btn:hover { border-color: rgba(139,92,246,0.4); color: rgba(255,255,255,0.6); }

/* 弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-content { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 0; padding: 40px; max-width: 400px; text-align: center; }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-size: 20px; margin-bottom: 12px; font-family: 'Noto Serif SC', serif; color: rgba(255,255,255,0.88); }
.modal-content p { color: var(--text-muted); margin-bottom: 24px; font-weight: 300; }
.modal-btn { padding: 14px 32px; border-radius: 0; font-size: 14px; font-weight: 400; cursor: pointer; letter-spacing: 2px; }
.modal-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: rgba(139,92,246,0.8); }

/* loading */
.loading-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading-overlay.show { opacity: 1; visibility: visible; }
.loading-spinner { width: 48px; height: 48px; border: 2px solid rgba(255,255,255,0.07); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .action-buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div class="noise"></div>

<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="if(confirm('确定要退出吗？'))location.href='index.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回
      </button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 36</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2.78%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="q-num">第 <span id="qNum">1</span> 题</div>
      <div class="q-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prev()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          上一题
        </button>
        <button class="nav-btn primary" id="nextBtn" onclick="next()" disabled>
          下一题
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container" id="resultContent"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <p style="margin-top:16px;color:var(--text-muted)">正在生成PDF报告...</p>
</div>

<script>
const questions = [
  // 情感连接 (6题)
  { q: "深夜失眠时，你脑海中反复出现的念头更接近哪个？", dim: "emotion", options: [
    { text: "有没有一个人，此刻也在想我", score: 4 },
    { text: "明天醒来，希望有人在身旁", score: 3 },
    { text: "这种安静其实也不坏", score: 1 },
    { text: "不如起来把明天的事理一理", score: 2 }
  ]},
  { q: "如果人生是一部电影，你最希望最后一个镜头是什么？", dim: "emotion", options: [
    { text: "和最爱的人对视，不必说话", score: 4 },
    { text: "一大家人围坐在一起笑", score: 3 },
    { text: "站在自己亲手建造的东西面前", score: 2 },
    { text: "独自站在山顶，看辽阔的风景", score: 1 }
  ]},
  { q: "一个人在异国街头迷路了，你第一个冒出的感受是？", dim: "emotion", options: [
    { text: "好想给某个人打个电话", score: 4 },
    { text: "如果身边有人就好了", score: 3 },
    { text: "这倒是个值得记录的体验", score: 2 },
    { text: "迷路本身就是一种探索", score: 1 }
  ]},
  { q: "你觉得「幸福」这个词最准确的画面是？", dim: "emotion", options: [
    { text: "被一个人彻底理解的瞬间", score: 4 },
    { text: "和在乎的人们平静地待在一起", score: 3 },
    { text: "做到了一件以前做不到的事", score: 2 },
    { text: "完全按自己的意志在活着", score: 1 }
  ]},
  { q: "有人说「人终究是孤独的」，你的第一反应是？", dim: "emotion", options: [
    { text: "所以才更需要找到那个懂你的人", score: 4 },
    { text: "不完全同意，爱可以抵消一部分孤独", score: 3 },
    { text: "自由和孤独是同一枚硬币的两面", score: 1 },
    { text: "孤独不可怕，无意义才可怕", score: 2 }
  ]},
  { q: "如果可以向命运交换一样东西，你最不愿意拿什么去换？", dim: "emotion", options: [
    { text: "和最重要的人之间的羁绊", score: 4 },
    { text: "家人朋友对我的信任", score: 3 },
    { text: "这些年积累的能力和成绩", score: 2 },
    { text: "随时可以说走就走的自由", score: 1 }
  ]},

  // 安全感 (6题)
  { q: "你更认同哪种说法？", dim: "security", options: [
    { text: "人活着，首先要有退路", score: 4 },
    { text: "谋定而后动，不打无准备的仗", score: 3 },
    { text: "车到山前必有路，想太多反而束缚", score: 2 },
    { text: "最好的计划就是没有计划", score: 1 }
  ]},
  { q: "如果把人生比作一场航行，你最在意什么？", dim: "security", options: [
    { text: "船身是否足够坚固", score: 4 },
    { text: "有没有一张靠谱的海图", score: 3 },
    { text: "风向如何，能不能灵活调整", score: 2 },
    { text: "驶向哪里不重要，海上的风景才重要", score: 1 }
  ]},
  { q: "面前有两扇门：一扇写着「确定」，一扇写着「可能」。你推哪扇？", dim: "security", options: [
    { text: "确定。已知的平庸好过未知的风险", score: 4 },
    { text: "确定。但会忍不住回头看另一扇门", score: 3 },
    { text: "可能。虽然有点怕", score: 2 },
    { text: "可能。不确定性才是活着的感觉", score: 1 }
  ]},
  { q: "你在梦里反复出现的场景更接近？", dim: "security", options: [
    { text: "赶不上某班车，或找不到回家的路", score: 4 },
    { text: "考试没准备好，或重要东西忘带了", score: 3 },
    { text: "在一个陌生地方自由地走", score: 2 },
    { text: "在高处飞翔或坠落", score: 1 }
  ]},
  { q: "什么时候你会对自己说「够了」？", dim: "security", options: [
    { text: "当我存够了能覆盖三年不工作的钱", score: 4 },
    { text: "当生活中没有太多意外的时候", score: 3 },
    { text: "当我做到了自己想做的事", score: 2 },
    { text: "从不——「够了」是一种停滞", score: 1 }
  ]},
  { q: "棋到中盘，局势不明。你的下法倾向是？", dim: "security", options: [
    { text: "先守住阵地，不犯错就是赢", score: 4 },
    { text: "算清楚几步再动", score: 3 },
    { text: "凭感觉搏一手，未必输", score: 2 },
    { text: "越乱越好，混战里才有机会", score: 1 }
  ]},

  // 物质金钱 (6题)
  { q: "假设你拥有一座花园，你最希望它长出什么？", dim: "money", options: [
    { text: "能不断结果的果树——成果要看得见摸得着", score: 4 },
    { text: "珍贵的花——美好的东西值得拥有", score: 3 },
    { text: "什么都种一点，够自己享受就好", score: 2 },
    { text: "随它野生——花园的意义不在收成", score: 1 }
  ]},
  { q: "你更同意哪个关于「贫穷」的说法？", dim: "money", options: [
    { text: "贫穷限制的不是想象力，是选择权", score: 4 },
    { text: "贫穷是一种需要被解决的问题", score: 3 },
    { text: "贫穷只是物质上的，不影响精神", score: 2 },
    { text: "真正的贫穷是内心的匮乏", score: 1 }
  ]},
  { q: "如果有一种药水能永久改变一项能力，你选？", dim: "money", options: [

let idx = 0;
let answers = new Array(36).fill(null);

function render() {
  const q = questions[idx];

  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('progressFill').style.width = `${((idx + 1) / questions.length) * 100}%`;
  document.getElementById('questionText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = q.options.map((opt, i) => `
    <div class="opt ${answers[idx] === i ? 'selected' : ''}" onclick="select(${i})">
      <div class="opt-radio"></div>
      <div class="opt-text">${opt.text}</div>
    </div>
  `).join('');

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').innerHTML = idx === questions.length - 1 ?
    '查看结果 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' :
    '下一题 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  document.getElementById('nextBtn').disabled = answers[idx] === null;
}

function select(i) {
  answers[idx] = i;
  render();
  if (idx < questions.length - 1) setTimeout(() => next(), 300);
  else setTimeout(() => next(), 300);
}

function prev() {
  if (idx > 0) { idx--; render(); }
}

function next() {
  if (answers[idx] === null) return;
  if (idx < questions.length - 1) { idx++; render(); }
  else { showResult(); }
}

function calcScores() {
  const scores = { emotion: 0, security: 0, money: 0, achievement: 0, freedom: 0, desired: 0 };
  answers.forEach((ansIdx, qIdx) => {
    if (ansIdx === null) return;
    const q = questions[qIdx];
    scores[q.dim] += q.options[ansIdx].score;
  });
  return scores;
}

function getDesireType(scores) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const highest = sorted[0];
  const second = sorted[1];

  // 只有当所有维度得分非常接近时才判定为分裂型（极差 <= 3）
  const range = sorted[0][1] - sorted[sorted.length - 1][1];
  if (range <= 3) return "desire_split";

  // 根据主导欲望判断类型
  const top = highest[0];
  if (top === "security") return "security_driven";
  if (top === "emotion") return "emotion_driven";
  if (top === "achievement" || top === "desired") return "achievement_driven";
  if (top === "freedom") return "freedom_driven";
  if (top === "money") {
    // 金钱主导时，看第二高维度来辅助判断
    if (second[0] === "achievement" || second[0] === "desired") return "achievement_driven";
    if (second[0] === "security") return "security_driven";
    if (second[0] === "freedom") return "freedom_driven";
    return "achievement_driven";
  }

  // 根据前两维度的组合做最终判断
  const topTwo = new Set([highest[0], second[0]]);
  if (topTwo.has("security")) return "security_driven";
  if (topTwo.has("emotion")) return "emotion_driven";
  if (topTwo.has("achievement") || topTwo.has("desired")) return "achievement_driven";
  if (topTwo.has("freedom")) return "freedom_driven";

  return "desire_split";
}

function getBlindSpot(scores) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = sorted[0];
  const bottom = sorted[sorted.length - 1];
  const gap = top[1] - bottom[1];
  const topInfo = dimensions[top[0]];
  const bottomInfo = dimensions[bottom[0]];

  let insight = '';
  if (gap >= 12) {
    insight = '你的欲望结构呈现出极端的「单极化」——' + topInfo.name + '（' + top[1] + '分）像一颗恒星一样吞噬了你几乎所有的心理能量，而' + bottomInfo.name + '（' + bottom[1] + '分）几乎处于休眠状态。这种结构说明你在过去的某个时间点做出了一个（可能是无意识的）决定：你把全部赌注押在了一种需求上。这种聚焦给了你巨大的驱动力，但也制造了一个巨大的盲区——你的' + bottomInfo.name + '需求不是不存在，只是你已经听不见它的声音了。当这种被压抑的需求积累到临界点，它不会礼貌地敲门——它会破门而入。';
  } else if (gap >= 8) {
    insight = '你的' + topInfo.name + '（' + top[1] + '分）和' + bottomInfo.name + '（' + bottom[1] + '分）之间有' + gap + '分的落差。这个落差意味着：你生活中的大部分决策都在被一种你可能没有完全意识到的力量牵引，同时你正在系统性地忽视另一种需求。你以为你「不在乎」' + bottomInfo.name + '，但更可能的事实是：你把它压低了，因为正视它太麻烦、太痛苦、或者太不符合你对自己的定义。';
  } else if (gap >= 5) {
    insight = '你的欲望结构相对平衡，但' + topInfo.name + '和' + bottomInfo.name + '之间仍然有一个值得注意的' + gap + '分差距。这不是一个危险信号，而是一个窗口——它告诉你，在日常的忙碌中，哪一种需求正在被你习惯性地放在最后。';
  } else {
    insight = '你的欲望结构异常均衡。六种需求的得分非常接近，这意味着你内心是一个复杂的议会而非一个独裁者——每种声音都有发言权，但也因此，你在做选择时可能常常感到内耗。你的盲点不是忽视了某种需求，而是你可能太民主了——每种需求都在说话，但没有人拍板。';
  }

  return {
    gap: gap,
    topDim: top[0],
    topScore: top[1],
    bottomDim: bottom[0],
    bottomScore: bottom[1],
    insight: insight
  };
}

        <div style="font-size:16px;margin-bottom:10px;opacity:0.9;">宇宙认知盐究所 · Space Salt Lab</div>

      </div>

      <div style="background:linear-gradient(135deg,#ede9fe 0%,#ddd6fe 100%);border-radius:16px;padding:24px;margin-bottom:25px;text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">${type.icon}</div>
        <div style="font-size:24px;font-weight:700;color:#5b21b6;margin-bottom:8px;">${type.name}</div>
        <div style="font-size:14px;color:#7c3aed;margin-bottom:16px;">${type.subtitle}</div>
        <div style="font-size:13px;color:#4c1d95;line-height:1.8;text-align:left;">${type.desc}</div>
      </div>

      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;color:#1e293b;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #e2e8f0;">深层心理分析</div>
        <div style="font-size:13px;color:#1e293b;line-height:1.8;margin-bottom:16px;">${type.analysis}</div>
        <div style="font-size:14px;font-weight:600;color:#dc2626;margin-bottom:8px;">你的阴影面</div>
        <div style="font-size:13px;color:#1e293b;line-height:1.8;">${type.shadow}</div>
      </div>

      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;color:#1e293b;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #e2e8f0;">六维度欲望解析</div>
        ${sortedDims.map(([dim, score]) => {
          const info = dimensions[dim];
          const pct = (score / maxScore) * 100;
          const level = pct >= 70 ? '主导' : pct >= 50 ? '中等' : '平和';
          const levelColor = pct >= 70 ? '#059669' : pct >= 50 ? '#d97706' : '#6366f1';
          const interp = getPdfDimInterp(dim, score);
          return `
            <div style="background:#f8fafc;border-radius:12px;padding:20px;margin-bottom:12px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <div style="font-size:16px;font-weight:600;color:#1e293b;">${info.icon} ${info.name}</div>

      </div>

      ${conflict ? `
      <div style="background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border-radius:12px;padding:20px;margin-bottom:25px;">

            <div style="color:#475569;font-size:13px;line-height:1.7;padding-top:4px;">${t}</div>
          </div>
        `).join('')}
      </div>

      <div style="background:linear-gradient(135deg,#ede9fe 0%,#ddd6fe 100%);border-radius:16px;padding:24px;margin-bottom:25px;text-align:center;">
        <div style="font-size:15px;color:#5b21b6;line-height:2;font-weight:500;">
          欲望不是你的敌人，它是你最诚实的翻译官<br>

        </div>
        <div style="font-size:13px;color:#7c3aed;line-height:1.8;margin-top:12px;">
          苏格拉底说「未经审视的人生不值得过」<br>
          看见自己的欲望结构，不是为了控制它<br>

        </div>

      <div style="background:#f8fafc;border-radius:12px;padding:20px;text-align:center;color:#94a3b8;font-size:12px;">
        <div style="margin-bottom:8px;font-weight:500;">宇宙认知盐究所 · Space Salt Lab</div>
        <div>本报告仅供参考，帮助你更好地理解内心的驱动力和需求结构</div>
      </div>
    `;

    document.body.appendChild(pdfContainer);
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));

    const canvas = await html2canvas(pdfContainer, { scale: 2, useCORS: true, backgroundColor: '#ffffff', height: pdfContainer.scrollHeight, windowHeight: pdfContainer.scrollHeight });
    document.body.removeChild(pdfContainer);

    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = canvas.width;
    const imgH = canvas.height;
    const pdfW = 210, pdfH = 297;
    let finalW = pdfW - 20;
    let finalH = finalW / (imgW / imgH);
    const pdf = new jsPDF('p', 'mm', 'a4');
    let remainingH = imgH;
    let srcY = 0;
    const pagePixelH = (pdfH - 20) / finalH * imgH;

    while (remainingH > 0) {
      const sliceH = Math.min(remainingH, pagePixelH);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = imgW;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
      const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
      const sliceFinalH = finalW / (imgW / sliceH);
      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, sliceFinalH);
      srcY += sliceH;
      remainingH -= sliceH;
    }

    pdf.save(`欲望比重测试报告_${date.replace(/\//g, '-')}.pdf`);

</script>
