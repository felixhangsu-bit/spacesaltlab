<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>压力与韧性测评 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root { --primary: #8b5cf6; --primary-dark: #7c3aed; --primary-light: #c4b5fd; --gradient: linear-gradient(135deg, #ddd6fe 0%, #8b5cf6 100%); --bg: #0a0a0a; --card: rgba(255,255,255,0.025); --text: rgba(255,255,255,0.88); --text-muted: rgba(255,255,255,0.38); --border: rgba(255,255,255,0.07); --shadow: 0 4px 20px rgba(0,0,0,0.3); --radius: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.noise { position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }
#testPage { background: var(--bg); padding: 20px; }
.test-container { max-width: 700px; margin: 0 auto; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-muted); font-family: 'Noto Sans SC', sans-serif; font-size: 14px; cursor: pointer; padding: 8px 12px; border-radius: 0; transition: all 0.2s; letter-spacing: 1px; }
.back-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.progress-wrap { text-align: right; }
.progress-text { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #ddd6fe, #8b5cf6); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border-radius: 0; padding: 40px; box-shadow: none; border: 1px solid var(--border); position: relative; }
.question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ddd6fe, #8b5cf6); }
.dim-tag { display: inline-block; padding: 6px 14px; border-radius: 0; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
.q-num { font-size: 13px; color: rgba(139,92,246,0.55); margin-bottom: 10px; font-family: 'EB Garamond', serif; letter-spacing: 3px; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 32px; font-family: 'Noto Serif SC', serif; color: rgba(255,255,255,0.88); }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; transition: all 0.2s; }
.opt:hover { border-color: rgba(139,92,246,0.3); background: rgba(255,255,255,0.02); }
.opt.selected { border-color: var(--primary); background: rgba(139,92,246,0.06); }
.opt-radio { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-text { font-size: 15px; font-family: 'Noto Sans SC', sans-serif; }
.nav-btns { display: flex; justify-content: space-between; margin-top: 28px; }
.nav-btn { padding: 12px 28px; border-radius: 0; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; text-transform: uppercase; }
.nav-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.nav-btn.secondary:hover { border-color: var(--primary); color: var(--primary); }
.nav-btn.primary { background: var(--primary); border: none; color: white; }
.nav-btn.primary:hover { background: var(--primary-dark); }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#resultPage { background: var(--bg); position: relative; z-index: 1; }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.result-header { text-align: center; color: var(--text); padding: 40px 0 40px; }
.result-header h1 { font-size: 28px; margin-bottom: 8px; font-family: 'Noto Serif SC', serif; font-weight: 700; background: linear-gradient(135deg, #ddd6fe, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-header p { color: var(--text-muted); font-family: 'EB Garamond', serif; letter-spacing: 3px; font-size: 14px; }
.card { background: var(--card); border-radius: 0; padding: 32px; box-shadow: none; margin-bottom: 20px; border: 1px solid var(--border); position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ddd6fe, #8b5cf6); }
.section-icon { width: 44px; height: 44px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-family: 'Noto Serif SC', serif; background: linear-gradient(135deg, #ddd6fe, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.resilience-score { font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #ddd6fe 0%, #8b5cf6 50%, #c4b5fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; line-height: 1.2; font-family: 'EB Garamond', serif; }
.resilience-level { text-align: center; padding: 8px 24px; background: var(--primary); color: white; border-radius: 0; display: inline-block; margin: 16px auto; font-weight: 600; letter-spacing: 2px; }
.stress-indicator { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; padding: 24px; margin-bottom: 20px; position: relative; }
.stress-indicator::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ef4444, #f59e0b); }
.stress-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; margin: 16px 0; }
.stress-fill { height: 100%; border-radius: 0; transition: width 0.5s; }
.stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
.stat-card { padding: 16px 12px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; text-align: center; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--primary); font-family: 'EB Garamond', serif; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 1px; }
.dim-item { margin-bottom: 20px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dim-name { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.dim-icon { width: 28px; height: 28px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.dim-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; margin-bottom: 12px; }
.dim-bar-fill { height: 100%; border-radius: 0; transition: width 0.5s; }
.level-badge { padding: 4px 12px; border-radius: 0; font-size: 12px; font-weight: 500; }
.level-high { background: rgba(4,78,59,0.5); color: #34d399; }
.level-medium { background: rgba(120,53,15,0.5); color: #fbbf24; }
.level-low { background: rgba(127,29,29,0.5); color: #f87171; }
.coping-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 16px; }
.coping-card { padding: 20px; border-radius: 0; border: 1px solid var(--border); }
.coping-card.positive { background: rgba(4,78,59,0.15); }
.coping-card.negative { background: rgba(127,29,29,0.15); }
.coping-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.coping-list { font-size: 13px; color: var(--text-muted); line-height: 1.8; }
.tip-item { display: flex; gap: 14px; padding: 16px; background: rgba(255,255,255,0.015); border-radius: 0; margin-bottom: 10px; border-left: 2px solid var(--primary); }
.tip-num { width: 26px; height: 26px; background: var(--primary); color: white; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; font-family: 'EB Garamond', serif; }
.tip-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.warning-box { background: rgba(127,29,29,0.1); border: 1px solid rgba(127,29,29,0.3); border-radius: 0; padding: 20px; margin-top: 20px; }
.warning-title { font-weight: 600; color: #dc2626; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.download-section { text-align: center; padding: 32px; }
.download-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: var(--primary); color: white; border: none; border-radius: 0; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.download-btn:hover { background: var(--primary-dark); }
.restart-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 0; font-size: 13px; color: var(--text-muted); cursor: pointer; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.restart-btn:hover { border-color: var(--primary); color: var(--primary); }
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading.show { opacity: 1; visibility: visible; }
.loading-box { background: #111; padding: 36px; border-radius: 0; text-align: center; border: 1px solid var(--border); }
.spinner { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-content { background: #111; padding: 36px; border-radius: 0; max-width: 400px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s; border: 1px solid var(--border); }
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-size: 22px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #ddd6fe, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: 'Noto Serif SC', serif; }
.modal-tests { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0; padding: 16px; margin-bottom: 16px; }
.modal-test-item { padding: 10px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); }
.modal-test-item:last-child { border-bottom: none; }
.modal-buttons { display: flex; flex-direction: column; gap: 10px; }
.modal-btn { padding: 14px 24px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; border: none; letter-spacing: 2px; font-family: 'Noto Sans SC', sans-serif; }
.modal-btn.primary { background: var(--primary); color: white; }
.modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.more-tests-btn { background: rgba(139,92,246,0.1); border-color: var(--primary); color: var(--primary-light); }
.chart-container { max-width: 350px; margin: 20px auto; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.card { animation: fadeInUp 0.5s ease-out; }
.stat-card { transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-2px); }
@media (max-width: 640px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } .coping-grid { grid-template-columns: 1fr; } .question-card { padding: 28px 20px; } }
</style>
</head>
<body>
<div class="noise"></div>
<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="exitTest()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>退出测试</button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 35</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag" style="display:none">压力感知</div>
      <div class="q-num">问题 <span id="qNum">1</span></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prevQ()">上一题</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">下一题</button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container">
    <div class="result-header"><h1>🌿 压力与韧性测评报告</h1><p>宇宙认知盐究所 · Space Salt Lab</p></div>
    <div id="resultContent"></div>
  </div>
</div>

<div class="loading" id="loading"><div class="loading-box"><div class="spinner"></div><p>正在生成报告...</p></div></div>

<script>
// 35道压力与韧性测评题目 — 哲学隐喻版
const questions = [
  // 压力感知 Stress (7题) - 反向计分
  { dim: 'stress', text: '如果给你最近的生活配一首背景音乐，节奏是？', options: ['舒缓的钢琴曲', '轻快的吉他弹唱', '不快不慢的爵士乐', '越来越快的电子乐', '停不下来的鼓点'], reverse: true },
  { dim: 'stress', text: '想象你正在大海上驾驶一艘小船，最近的海面状况是？', options: ['风平浪静，我悠闲地晒太阳', '偶尔有浪，但我掌舵自如', '时不时颠簸，需要集中注意力', '浪很大，我在努力不偏航', '暴风雨中，我只想不翻船'], reverse: true },
  { dim: 'stress', text: '如果你的生活是一个天气预报，最近的天气是？', options: ['万里晴空，阳光正好', '多云转晴，偶有微风', '阴晴不定，需要随身带伞', '连绵阴雨，很久没见太阳', '暴风雪预警，能见度为零'], reverse: true },
  { dim: 'stress', text: '西西弗斯每天推巨石上山，你最近推"石头"的感觉是？', options: ['什么石头？我在山顶野餐呢', '石头不重，权当锻炼身体', '推得动，但到山腰会喘气', '石头越来越重，经常滚回去', '我已经被石头压在下面了'], reverse: true },
  { dim: 'stress', text: '如果你的精力是一部手机电池，最近的常态电量是？', options: ['满格100%，随时待命', '80%左右，状态不错', '50%上下，省着用还行', '20%以下，低电量焦虑', '1%闪烁，随时关机'], reverse: true },
  { dim: 'stress', text: '庄子说"无用之用方为大用"。最近，你觉得自己"无用地发呆"的时间？', options: ['很充裕，我享受留白', '有一些，偶尔放空', '不多，总觉得该做点什么', '几乎没有，脑子停不下来', '发呆？那是什么奢侈品？'], reverse: true },
  { dim: 'stress', text: '假设生活是一盘棋，你最近觉得自己是？', options: ['执棋者，从容布局', '走一步想三步的棋手', '被动应对的防守方', '顾此失彼的残局', '感觉对手在下盲棋'], reverse: true },

  // 情绪韧性 Emotional (7题)
  { dim: 'emotional', text: '一栋你精心搭建的积木塔倒了，你的第一个念头是？', options: ['已经在想怎么搭一个更好的', '有点可惜，但这就是积木的乐趣', '愣一会儿，然后慢慢收拾', '心里堵得慌，不想面对那堆碎片', '不想再碰积木了'] },
  { dim: 'emotional', text: '尼采说"凝视深渊时，深渊也在凝视你"。面对人生的"深渊时刻"，你通常？', options: ['向深渊眨眨眼，然后转身走自己的路', '承认恐惧，但不会被吞噬', '盯着看一会儿，需要时间消化', '很难移开目光，容易陷进去', '感觉自己正在被深渊吞没'] },
  { dim: 'emotional', text: '冬天过去了，但春天迟迟没来。你会？', options: ['给自己生一堆篝火，边烤火边等', '相信季节终会轮转，耐心等待', '有点焦虑，反复查看日历', '越等越冷，开始怀疑春天是否存在', '已经冻僵了，感受不到温度变化'] },
  { dim: 'emotional', text: '一位禅师说"不确定性是唯一确定的事"。对于生活中的未知，你的态度是？', options: ['未知是最好的礼物，充满可能性', '有些不安，但愿意拥抱它', '能接受，但更喜欢有确定的计划', '未知让我焦虑，我需要掌控一切', '不确定性让我几乎无法行动'] },
  { dim: 'emotional', text: '一颗种子被埋在黑暗的土壤里。你觉得这是？', options: ['生命破土前的必要准备', '虽然暗，但正在积蓄力量', '不太舒服，但也许有意义', '太黑了，不确定能不能发芽', '感觉被永远埋葬了'] },
  { dim: 'emotional', text: '日本有一种美学叫"金缮"——用金粉修补碎裂的陶器。你怎么看待自己的"裂痕"？', options: ['每条裂痕都让我更独特、更珍贵', '裂痕是故事的一部分，我接受它', '有些裂痕我能接受，有些还在痛', '我更愿意假装裂痕不存在', '裂痕太多了，感觉要碎掉了'] },
  { dim: 'emotional', text: '如果你的情绪是一片海洋，暴风雨来临时，海底的状态是？', options: ['深处始终平静，风浪只在表面', '会有些波动，但很快恢复宁静', '上下翻涌，需要时间才能沉淀', '从海面到海底都在剧烈翻搅', '感觉整片海洋都要被掀翻了'] },

  // 认知灵活 Cognitive (7题)
  { dim: 'cognitive', text: '你在森林里迷路了，原来的路被一棵倒下的大树挡住了。你会？', options: ['兴奋地探索新的路径，说不定风景更好', '绕道而行，条条大路通罗马', '有点犯难，但会试着找其他方向', '反复尝试翻越那棵树，不太想换路', '站在原地不知所措'] },
  { dim: 'cognitive', text: '盲人摸象的故事里，六个盲人各执一端。你觉得最接近真相的做法是？', options: ['把所有人的描述拼在一起，真相才完整', '每个角度都有道理，需要综合思考', '先听大多数人的意见，再做判断', '最先摸到的那个角度应该最准', '太复杂了，不如不去想'] },

}

function calcScores() {
  const scores = { stress: 0, emotional: 0, cognitive: 0, social: 0, efficacy: 0 };
  answers.forEach((v, i) => {
    const q = questions[i];
    if (q.dim === 'stress') {
      // 压力题目特殊处理
      scores.stress += v; // 高分=高压力
    } else {
      scores[q.dim] += (4 - v); // 其他维度：0=非常符合=4分
    }
  });
  return scores;
}

function getResiliencePhilosophy(scores, total) {

    efficacy: '从一件小事开始，证明给自己看。信心不是等来的，而是一次次小小成功积累出来的。'
  };

  let summary;

    summary = `你的韧性图谱均衡而有力，最突出的是${strongest.name}。你已经发展出了一套属于自己的"生命哲学"——面对困境时，你不是简单地忍耐，而是在困境中发现意义、寻找成长。这接近于尼采所说的"爱命运"(Amor Fati)的境界。`;
  } else if (ratio >= 0.6) {
    summary = `你的韧性正在成型，其中${strongest.name}是你的主力军团，而${weakest.name}还有成长空间。就像一座城堡，你的主塔已经很坚固，但某些城墙还需要加固。好消息是：你已经拥有了足够的资源来补强短板。`;

    summary = `你正处在韧性觉醒的关键时期。${strongest.name}是你目前最可依靠的力量支点。存在主义哲学告诉我们：正是在面对困境时，人才真正开始塑造自己。你现在的每一个选择，都在定义未来的你。`;
  } else {
    summary = `你正站在成长的起跑线上，这本身就需要勇气。禅宗说"初心即是道心"——最重要的不是你现在在哪里，而是你愿意出发。${strongest.name}是你的种子力量，从这里开始浇灌，一切都会生长。`;

  return {

    <!-- 哲学收尾 -->

        datasets: [{ data: [scores.emotional, scores.cognitive, scores.social, scores.efficacy], backgroundColor: 'rgba(102, 126, 234, 0.2)', borderColor: 'rgba(102, 126, 234, 1)', borderWidth: 2, pointBackgroundColor: 'rgba(102, 126, 234, 1)' }]
      },
      options: { scales: { r: { beginAtZero: true, max: 28, ticks: { stepSize: 7, color: 'rgba(255,255,255,0.38)', backdropColor: 'transparent' }, grid: { color: 'rgba(255,255,255,0.07)' }, angleLines: { color: 'rgba(255,255,255,0.07)' }, pointLabels: { color: 'rgba(255,255,255,0.75)' } } }, plugins: { legend: { display: false } } }
    });

function restart() { if (confirm('确定要重新测试吗？')) location.reload(); }

async function downloadPDF() {
  const btn = document.getElementById('dlBtn');
  const loading = document.getElementById('loading');
  btn.disabled = true; btn.innerHTML = '生成中...'; loading.classList.add('show');
  try {
    const scores = calcScores();
    const resilienceTotal = scores.emotional + scores.cognitive + scores.social + scores.efficacy;
    const stressLevel = getStressLevel(scores.stress);
    const resilienceLevel = getResilienceLevel(resilienceTotal);
    const date = new Date().toLocaleDateString('zh-CN');

    const pdfContainer = document.createElement('div');
    pdfContainer.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;background:#0f172a;padding:40px;font-family:"Noto Sans SC",sans-serif;color:#e2e8f0;';
    pdfContainer.innerHTML = `
      <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:50px 40px;margin:-40px -40px 30px -40px;text-align:center;color:#fff;">
        <div style="font-size:16px;margin-bottom:10px;opacity:0.9;">宇宙认知盐究所 · Space Salt Lab</div>
        <div style="font-size:32px;font-weight:700;margin-bottom:15px;">压力与韧性测评报告</div>
        <div style="font-size:14px;opacity:0.8;">测评日期：${date}</div>
      </div>

      <div style="display:flex;gap:20px;margin-bottom:25px;">
        <div style="flex:1;background:linear-gradient(135deg,#3b1c1c,#3b2a1a);border-radius:16px;padding:24px;text-align:center;">
          <div style="font-size:14px;color:#94a3b8;margin-bottom:8px;">压力水平</div>
          <div style="font-size:36px;font-weight:700;color:${stressLevel.color};">${scores.stress}/28</div>
          <div style="font-size:16px;font-weight:600;color:${stressLevel.color};">${stressLevel.level}</div>
        </div>
        <div style="flex:1;background:#1e293b;border-radius:16px;padding:24px;text-align:center;">
          <div style="font-size:14px;color:#94a3b8;margin-bottom:8px;">韧性指数</div>
          <div style="font-size:36px;font-weight:700;color:${resilienceLevel.color};">${resilienceTotal}/112</div>
          <div style="font-size:16px;font-weight:600;color:${resilienceLevel.color};">${resilienceLevel.level}</div>
        </div>
      </div>

      <div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:25px;">
        <div style="font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:10px;">压力状态解读</div>
        <div style="font-size:13px;color:#94a3b8;line-height:1.8;">${stressLevel.desc}</div>
      </div>

      <div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:25px;">
        <div style="font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:10px;">韧性水平解读</div>
        <div style="font-size:13px;color:#94a3b8;line-height:1.8;">${resilienceLevel.desc}</div>
      </div>

      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #334155;">四维度深度分析</div>
        ${['emotional', 'cognitive', 'social', 'efficacy'].map(d => {
          const info = dimInfo[d];
          const score = scores[d];
          const lv = getLevel(score, 28);
          const pct = Math.round(score/28*100);
          return `
            <div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:12px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <div style="font-size:16px;font-weight:600;color:#e2e8f0;">${info.icon} ${info.name}</div>
                <div style="display:flex;align-items:center;gap:10px;">
                  <span style="background:${lv.color};color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;">${lv.level}</span>
                  <span style="font-weight:700;color:#667eea;">${score}/28</span>
                </div>
              </div>
              <div style="background:#334155;height:8px;border-radius:4px;margin-bottom:10px;">
                <div style="background:linear-gradient(90deg,#667eea,#764ba2);height:100%;border-radius:4px;width:${pct}%;"></div>
              </div>
              <div style="color:#94a3b8;font-size:13px;line-height:1.7;">${getDimAnalysis(d, score)}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #334155;">压力管理建议</div>
        ${['每天进行15-20分钟的放松活动，如深呼吸、冥想或轻度运动', '保持规律的作息时间，确保每晚7-8小时的优质睡眠', '建立清晰的工作与生活边界，学会说"不"', '培养至少一项能让你感到放松和愉悦的爱好', '定期与信任的人分享感受，不要独自承担所有压力'].map((t, i) => `
          <div style="display:flex;gap:12px;margin-bottom:12px;">
            <div style="width:28px;height:28px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;">${i+1}</div>
            <div style="color:#94a3b8;font-size:14px;line-height:1.7;padding-top:4px;">${t}</div>
          </div>
        `).join('')}

      ${scores.stress > 21 ? `
      <div style="background:linear-gradient(135deg,#3b1c1c 0%,#3b2a1a 100%);border:1px solid #7f1d1d;border-radius:12px;padding:20px;margin-bottom:25px;">
        <div style="font-size:14px;font-weight:600;color:#f87171;margin-bottom:8px;">⚠️ 重要提示</div>
        <div style="font-size:13px;color:#fca5a5;line-height:1.7;">
          你当前的压力水平较高，这可能会影响你的身心健康。建议你：优先处理最紧急的压力源；主动寻求家人、朋友或专业人士的支持；如果持续感到难以承受，请考虑寻求专业心理咨询。
        </div>
      </div>
      ` : ''}

      <div style="background:#1e293b;border-radius:12px;padding:20px;text-align:center;color:#94a3b8;font-size:12px;">
        <div style="margin-bottom:8px;font-weight:500;">宇宙认知盐究所 · Space Salt Lab</div>
        <div>本报告仅供参考，不构成心理诊断或医学建议。如果您正在经历严重的压力或情绪问题，建议寻求专业帮助。</div>
      </div>
    `;
    document.body.appendChild(pdfContainer);
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    const canvas = await html2canvas(pdfContainer, { scale: 2, useCORS: true, backgroundColor: '#0f172a', height: pdfContainer.scrollHeight, windowHeight: pdfContainer.scrollHeight });
    document.body.removeChild(pdfContainer);
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = canvas.width;
    const imgH = canvas.height;
    const pdfW = 210, pdfH = 297;
    let finalW = pdfW - 20;
    let finalH = finalW / (imgW / imgH);
    const pdf = new jsPDF('p', 'mm', 'a4');
    let remainingH = imgH;
    let srcY = 0;
    const pagePixelH = (pdfH - 20) / finalH * imgH;
    while (remainingH > 0) {
      const sliceH = Math.min(remainingH, pagePixelH);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = imgW;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
      const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
      const sliceFinalH = finalW / (imgW / sliceH);
      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, sliceFinalH);
      srcY += sliceH;
      remainingH -= sliceH;
    }
    pdf.save(`压力与韧性测评报告_${date}.pdf`);
  } catch (e) { console.error(e); alert('PDF生成失败'); }
  finally { btn.disabled = false; btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告'; loading.classList.remove('show'); }
}

render();
</script>
