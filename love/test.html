<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱情深度测评 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #8b5cf6;
  --primary-dark: #7c3aed;
  --primary-light: rgba(139,92,246,0.55);
  --gradient: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.025);
  --text: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.07);
  --shadow: none;
  --radius: 0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; position: relative; }
.noise { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }
#testPage { background: var(--bg); padding: 20px; }
.test-container { max-width: 700px; margin: 0 auto; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-muted); font-family: 'Noto Sans SC', sans-serif; font-size: 13px; letter-spacing: 1px; cursor: pointer; padding: 8px 12px; border-radius: 0; transition: all 0.2s; }
.back-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.progress-wrap { text-align: right; }
.progress-text { font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border-radius: 0; padding: 40px; border: 1px solid var(--border); position: relative; }
.question-card::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: linear-gradient(180deg, var(--primary), transparent); }
.dim-tag { display: none; padding: 6px 14px; border-radius: 0; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
.q-num { font-family: 'EB Garamond', serif; font-size: 13px; color: rgba(139,92,246,0.55); margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; }
.q-text { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.88); line-height: 1.5; margin-bottom: 32px; }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; transition: all 0.2s; }
.opt:hover { border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.04); }
.opt.selected { border-color: rgba(139,92,246,0.6); background: rgba(139,92,246,0.08); }
.opt-radio { width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 6px; height: 6px; background: white; border-radius: 50%; }
.opt-text { font-size: 14px; font-weight: 400; color: var(--text-muted); }
.opt:hover .opt-text { color: var(--text); }
.opt.selected .opt-text { color: var(--text); }
.nav-btns { display: flex; gap: 12px; margin-top: 32px; }
.nav-btn { flex: 1; padding: 14px; border-radius: 0; font-size: 13px; font-weight: 500; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
.nav-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.nav-btn.secondary:hover { border-color: rgba(139,92,246,0.4); color: var(--text); }
.nav-btn.primary { background: var(--primary); border: 1px solid var(--primary); color: white; }
.nav-btn.primary:hover { background: var(--primary-dark); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

#resultPage { background: var(--bg); position: relative; z-index: 1; }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px 60px; }
.result-header { text-align: center; color: var(--text); margin-bottom: 32px; padding-top: 20px; }
.result-header h1 { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #a78bfa, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-header p { opacity: 0.38; font-size: 13px; letter-spacing: 1px; }
.card { background: var(--card); border-radius: 0; padding: 32px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: linear-gradient(180deg, var(--primary), transparent); }
.section-title { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-icon { width: 32px; height: 32px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }

.score-hero { text-align: center; padding: 40px 32px; border-radius: 0; background: rgba(139,92,246,0.04); border: 1px solid var(--border); margin-bottom: 24px; position: relative; overflow: hidden; }
.score-hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
.score-label { font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; position: relative; letter-spacing: 3px; }
.score-number { font-family: 'EB Garamond', serif; font-size: 80px; font-weight: 400; background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 30%, #c4b5fd 60%, #8b5cf6 100%); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; position: relative; animation: gradient-shift 3s ease infinite; }
@keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.score-suffix { font-family: 'EB Garamond', serif; font-size: 24px; color: var(--primary); margin-left: 4px; }
.score-title { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #8b5cf6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 16px 0 8px; position: relative; }
.score-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; position: relative; }

.quote-card { margin: 20px 0; padding: 28px 32px; background: rgba(139,92,246,0.03); border-radius: 0; border-left: 2px solid var(--primary); position: relative; overflow: hidden; }
.quote-card::before { content: '\201C'; position: absolute; top: -10px; left: 16px; font-size: 80px; font-family: 'EB Garamond', serif; color: rgba(139,92,246,0.1); line-height: 1; }
.quote-card::after { content: none; }
.quote-text { font-family: 'Noto Serif SC', serif; font-size: 15px; font-style: italic; color: var(--text); line-height: 1.8; margin-bottom: 12px; position: relative; z-index: 1; }
.quote-author { font-family: 'EB Garamond', serif; font-size: 13px; color: var(--primary-light); text-align: right; position: relative; z-index: 1; letter-spacing: 1px; }

.type-card { text-align: center; padding: 32px 24px; border-radius: 0; background: rgba(139,92,246,0.04); border: 1px solid var(--border); margin-bottom: 20px; position: relative; overflow: hidden; }
.type-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
.type-card::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 1px; background: linear-gradient(90deg, transparent, rgba(139,92,246,0.2), transparent); }
.type-label { font-family: 'EB Garamond', serif; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 3px; }
.type-name { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #8b5cf6, #a78bfa, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
.type-desc { font-size: 13px; color: var(--text-muted); line-height: 1.8; }
.type-story { margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); text-align: left; }
.type-story-label { font-family: 'EB Garamond', serif; font-size: 12px; color: var(--primary-light); margin-bottom: 6px; letter-spacing: 3px; }
.type-story-text { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

.section-divider { height: 1px; margin: 8px 0 20px; background: linear-gradient(90deg, transparent, var(--border), transparent); border-radius: 0; opacity: 1; }

.chart-wrap { max-width: 350px; margin: 0 auto; }
.dim-item { padding: 16px; border: 1px solid var(--border); border-radius: 0; margin-bottom: 12px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.dim-name { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
.dim-icon { width: 32px; height: 32px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.dim-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 0; }
.level-badge { padding: 4px 10px; border-radius: 0; font-size: 11px; font-weight: 500; letter-spacing: 1px; }
.level-high { background: rgba(139,92,246,0.1); color: #a78bfa; }
.level-medium { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); }
.level-low { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.3); }

.summary-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }
.highlight-box { margin-top: 16px; padding: 16px 20px; background: rgba(139,92,246,0.03); border-radius: 0; border: 1px solid var(--border); position: relative; overflow: hidden; }
.highlight-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--primary); }
.highlight-box p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.highlight-box strong { color: var(--text); }

.tip-item { display: flex; gap: 12px; padding: 14px; background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); margin-bottom: 10px; }
.tip-num { width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 0; display: flex; align-items: center; justify-content: center; font-family: 'EB Garamond', serif; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.tip-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

.trait-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
.trait-item { padding: 14px; background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); text-align: center; }
.trait-icon { font-size: 24px; margin-bottom: 6px; }
.trait-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 1px; }
.trait-value { font-size: 15px; font-weight: 600; color: var(--text); }

.love-meter { margin: 20px 0; padding: 20px; background: rgba(139,92,246,0.03); border-radius: 0; border: 1px solid var(--border); }
.meter-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; position: relative; }
.meter-fill { height: 100%; background: var(--primary); border-radius: 0; transition: width 1s ease-out; }
.meter-labels { display: flex; justify-content: space-between; margin-top: 8px; font-family: 'EB Garamond', serif; font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

.partner-card { background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); padding: 16px; margin-top: 16px; }
.partner-card h4 { font-family: 'Noto Serif SC', serif; font-size: 14px; margin-bottom: 12px; color: var(--text); }
.partner-list { list-style: none; padding: 0; }
.partner-list li { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
.partner-list li:last-child { border-bottom: none; }
.partner-list li::before { content: '\2014'; color: var(--primary-light); font-size: 12px; }

.action-btns { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.restart-btn { flex: 1; min-width: 140px; padding: 14px 20px; border-radius: 0; font-size: 13px; font-weight: 500; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.restart-btn.primary { background: var(--primary); border: 1px solid var(--primary); color: white; }
.restart-btn.primary:hover { background: var(--primary-dark); }
.restart-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.restart-btn.secondary:hover { border-color: rgba(139,92,246,0.4); color: var(--text); }

.celebrity-box { background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); padding: 16px; margin-top: 16px; }
.celebrity-box h4 { font-size: 14px; margin-bottom: 12px; }
.celebrity-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; }
.celebrity-item .gender { font-size: 20px; }
.celebrity-item .info { flex: 1; }
.celebrity-item .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.celebrity-item .desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
.modal-overlay.show { opacity: 1; }
.modal-content { background: #111; border-radius: 0; border: 1px solid var(--border); padding: 32px; max-width: 400px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s; }
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-family: 'Noto Serif SC', serif; font-size: 20px; margin-bottom: 12px; }
.modal-content p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
.modal-btn { width: 100%; padding: 14px; border-radius: 0; font-size: 13px; font-weight: 500; letter-spacing: 2px; cursor: pointer; margin-bottom: 10px; }
.modal-btn.primary { background: var(--primary); border: 1px solid var(--primary); color: white; }
.modal-btn.secondary { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); }

.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,10,0.92); display: none; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; gap: 16px; }
.loading-overlay.show { display: flex; }
.loading-spinner { width: 48px; height: 48px; border: 1px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.insight-card { background: rgba(139,92,246,0.04); border-radius: 0; border: 1px solid var(--border); padding: 16px; margin-top: 16px; }
.insight-card h4 { font-family: 'Noto Serif SC', serif; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.insight-card p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

.energy-card { padding: 16px; background: rgba(255,255,255,0.02); border-radius: 0; border: 1px solid var(--border); text-align: center; position: relative; overflow: hidden; }
.energy-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); opacity: 0.3; }
</style>
</head>
<body>
<div class="noise"></div>

<div id="testPage" class="page active">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="if(confirm('确定要退出吗？'))location.href='index.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回
      </button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 42</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2.4%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag">维度</div>
      <div class="q-num">第 <span id="qNum">1</span> 题</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prev()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          上一题
        </button>
        <button class="nav-btn primary" id="nextBtn" onclick="next()" disabled>
          下一题
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container" id="resultContent"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div style="color:var(--text-muted)">正在生成报告...</div>
</div>

<script>
const questions = [
  // 维度A - 情感依恋度 (7题)
  { dim: 'A', text: '如果思念有重量，你的口袋现在是什么状态？', opts: ['轻如蝉翼，几乎忘记它的存在', '偶尔沉一下，像揣了颗温热的石头', '走路都慢了半拍，总是不经意地摸一摸', '整个人都被压进了沙发里，甘之如饴'] },
  { dim: 'A', text: '深夜两点，窗外下起了今年第一场雪。你的第一反应是？', opts: ['拍照发朋友圈，和所有人分享', '觉得挺美的，明天可以跟TA提一嘴', '立刻想拿起手机告诉TA，又怕吵醒TA', '对着窗户发呆，脑海里全是和TA一起看雪的画面'] },
  { dim: 'A', text: '如果你的情绪是一片海，TA的消息像什么？', opts: ['海面上偶尔掠过的一阵微风', '能掀起几朵小浪花的石子', '让整片海潮汐涨落的月亮', 'TA就是海本身，分不清哪里是TA哪里是我'] },
  { dim: 'A', text: '你手机里最近一次删掉又重新打出来的消息，大概率发给谁？', opts: ['谁都有可能，不一定是TA', '可能是TA，但我一般直接发不犹豫', '八成是TA，总想把措辞调到最好', '一定是TA，每句话都想让TA收到最温柔的版本'] },
  { dim: 'A', text: '在一座你从未去过的城市旅行，走到一条特别美的小巷子。你会？', opts: ['拍几张照留给自己就好', '发一条动态，TA看到也行看不到也行', '专门挑最美的角度拍给TA看，想象TA在身边', '突然有点走不动了——所有美的事物都让你更想TA'] },
  { dim: 'A', text: '如果把TA对你的影响比作天气，最像哪种？', opts: ['偶尔的晴天，锦上添花', '稳定的暖阳，让人舒服', 'TA开心我就放晴，TA难过天就阴了', 'TA就是我的整个气候系统，一切因TA而变'] },
  { dim: 'A', text: '老歌《月亮代表我的心》里唱"你问我爱你有多深"——你觉得这个问题？', opts: ['有点矫情，爱不需要量化', '可以想一想，但答案不会太夸张', '嘴上不说，心里其实有一个很长的答案', '这首歌根本唱不完我想说的话'] },

const defaultLabels = ['不太符合', '有点符合', '比较符合', '非常符合'];

let idx = 0;
let answers = new Array(42).fill(null);

function render() {
  const q = questions[idx];
  const info = dimInfo[q.dim];
  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = ((idx + 1) / 42 * 100) + '%';

  const labels = q.opts || defaultLabels;
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  labels.forEach((label, i) => {
    const opt = document.createElement('div');
    opt.className = 'opt' + (answers[idx] === i ? ' selected' : '');
    opt.innerHTML = `<div class="opt-radio"></div><div class="opt-text">${label}</div>`;
    opt.onclick = () => selectOption(i);
    optDiv.appendChild(opt);
  });

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = answers[idx] === null;
  document.getElementById('nextBtn').innerHTML = idx === 41 ? '查看结果 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' : '下一题 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
}

function selectOption(val) {
  answers[idx] = val;
  render();
  if (idx < 41) setTimeout(() => next(), 300);
  else setTimeout(() => next(), 300);
}

function prev() { if (idx > 0) { idx--; render(); } }

function next() {
  if (answers[idx] === null) return;
  if (idx < 41) { idx++; render(); }
  else { showResult(); }
}

function calcScores() {
  const scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
  const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };

  questions.forEach((q, i) => {
    if (answers[i] !== null) {
      scores[q.dim] += answers[i];
      counts[q.dim]++;
    }
  });

  return scores;
}

function getNormalized(scores) {
  // 每个维度7题，每题0-3分，满分21分
  return {
    A: Math.round(scores.A / 21 * 100),
    B: Math.round(scores.B / 21 * 100),
    C: Math.round(scores.C / 21 * 100),
    D: Math.round(scores.D / 21 * 100),
    E: Math.round(scores.E / 21 * 100),
    F: Math.round(scores.F / 21 * 100)
  };
}

function getTotalLoveScore(norm) {
  // 综合爱情指数：各维度加权平均
  const weights = { A: 0.20, B: 0.15, C: 0.10, D: 0.20, E: 0.20, F: 0.15 };
  let total = 0;
  Object.keys(weights).forEach(dim => {
    total += norm[dim] * weights[dim];
  });
  return Math.round(total);
}

    traits.push('同样专一深情，眼里心里都是你');
  }

  if (traits.length < 4) {
    traits.push('理解你的爱情观，能与你产生共鸣');
    traits.push('愿意和你一起成长，共同经营感情');
    traits.push('性格互补，能给你带来新的视角');
  }

  return traits.slice(0, 5);
}

  // 理想伴侣构型分析

  // 年龄偏好分析
  let agePreference = '';
  if (norm.D >= 70 && norm.E >= 70) {

  // 理想伴侣构型
  let archetype = '';
  if (norm.A >= 75 && norm.F >= 75) {

  } else if (norm.D >= 75 && norm.E >= 75) {

  } else if (norm.B >= 75 && norm.C >= 70) {

  } else if (norm.A >= 70 && norm.D >= 70) {

async function downloadPDF() {
  const btn = event.target.closest('button');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  btn.innerHTML = '生成中...';
  loading.classList.add('show');

  try {
    const { jsPDF } = window.jspdf;
    const content = document.getElementById('resultContent');

    await new Promise(r => setTimeout(r, 500));

    const canvas = await html2canvas(content, {
      scale: 2,
      useCORS: true,
      logging: false,
      backgroundColor: '#0a0a0a',
      height: content.scrollHeight,
      windowHeight: content.scrollHeight
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pdfWidth - 20;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
    heightLeft -= (pdfHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
      heightLeft -= (pdfHeight - 20);
    }

    const date = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
    pdf.save(`爱情深度测评报告_${date}.pdf`);
  } catch (e) {
    console.error(e);
    alert('PDF生成失败');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告';
    loading.classList.remove('show');
  }
}
