<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情绪智力测评 | 宇宙认知盐究所</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #8b5cf6; --primary-dark: #7c3aed; --primary-light: #a78bfa;
  --bg: #0a0a0a; --card: rgba(255,255,255,0.025); --card-border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.88); --text-muted: rgba(255,255,255,0.38);
  --border: rgba(255,255,255,0.07); --accent: rgba(139,92,246,0.55);
  --gradient: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.noise { position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: block; }
#testPage { background: var(--bg); padding: 20px; }
.test-container { max-width: 700px; margin: 0 auto; }
.test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 8px 16px; border-radius: 0; transition: all 0.2s; letter-spacing: 1px; }
.back-btn:hover { border-color: rgba(139,92,246,0.4); color: var(--text); }
.progress-wrap { text-align: right; }
.progress-text { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-family: 'EB Garamond', serif; letter-spacing: 2px; }
.progress-bar { width: 180px; height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gradient); border-radius: 0; transition: width 0.3s; }
.question-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 40px; position: relative; }
.question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
.dim-tag { display: inline-block; padding: 6px 14px; border-radius: 0; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
.q-num { font-family: 'EB Garamond', serif; font-size: 14px; color: var(--accent); margin-bottom: 10px; letter-spacing: 3px; }
.q-text { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 32px; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; transition: all 0.2s; }
.opt:hover { border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.03); }
.opt.selected { border-color: rgba(139,92,246,0.6); background: rgba(139,92,246,0.08); }
.opt-radio { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.opt.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.opt.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-text { font-size: 15px; }
.nav-btns { display: flex; justify-content: space-between; margin-top: 28px; }
.nav-btn { padding: 12px 28px; border-radius: 0; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 2px; }
.nav-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
.nav-btn.secondary:hover { border-color: rgba(139,92,246,0.4); color: var(--primary-light); }
.nav-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); }
.nav-btn.primary:hover { background: rgba(139,92,246,0.25); }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#resultPage { background: var(--bg); }
.result-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.result-header { text-align: center; color: var(--text); padding: 40px 0 40px; }
.result-header h1 { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.result-header p { color: var(--text-muted); font-size: 13px; letter-spacing: 3px; }
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 32px; margin-bottom: 20px; position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
.section-icon { width: 44px; height: 44px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
.section-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.eq-score { font-family: 'EB Garamond', serif; font-size: 64px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
.eq-level { text-align: center; padding: 8px 24px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); border-radius: 0; display: inline-block; margin: 16px auto; font-weight: 600; letter-spacing: 2px; }
.eq-desc { text-align: center; color: var(--text-muted); font-size: 15px; line-height: 1.8; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
.stat-card { padding: 16px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; text-align: center; }
.stat-value { font-family: 'EB Garamond', serif; font-size: 24px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.dim-item { margin-bottom: 20px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dim-name { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.dim-icon { width: 28px; height: 28px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.dim-score { font-weight: 600; color: var(--primary); }
.dim-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; margin-bottom: 12px; }
.dim-bar-fill { height: 100%; border-radius: 0; transition: width 0.5s; }
.level-badge { padding: 4px 12px; border-radius: 0; font-size: 12px; font-weight: 500; }
.level-high { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
.level-medium { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
.level-low { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
.dim-analysis { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; }
.tip-item { display: flex; gap: 14px; padding: 16px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; margin-bottom: 10px; border-left: 2px solid var(--primary); }
.tip-num { font-family: 'EB Garamond', serif; width: 26px; height: 26px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.tip-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.download-section { text-align: center; padding: 32px; }
.download-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
.download-btn:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.6); }
.restart-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 0; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
.restart-btn:hover { border-color: rgba(139,92,246,0.4); color: var(--primary-light); }
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.loading.show { opacity: 1; visibility: visible; }
.loading-box { background: #111; padding: 36px; border-radius: 0; text-align: center; border: 1px solid var(--border); }
.spinner { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-content { background: #111; padding: 36px; border-radius: 0; max-width: 400px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s; border: 1px solid var(--border); }
.modal-overlay.show .modal-content { transform: scale(1); }
.modal-icon { font-size: 48px; margin-bottom: 16px; }
.modal-content h3 { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; margin-bottom: 12px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.modal-content > p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.modal-tests { background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 0; padding: 16px; margin-bottom: 16px; }
.modal-test-item { padding: 10px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); }
.modal-test-item:last-child { border-bottom: none; }
.modal-tip { font-size: 13px; color: var(--primary); font-weight: 500; margin-bottom: 20px; }
.modal-buttons { display: flex; flex-direction: column; gap: 10px; }
.modal-btn { padding: 14px 24px; border-radius: 0; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; letter-spacing: 2px; }
.modal-btn.primary { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); }
.modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.more-tests-btn { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.3); color: var(--primary-light); }
.chart-container { max-width: 350px; margin: 20px auto; }
/* 装饰分隔线 */
.section-divider { text-align: center; padding: 24px 0; color: var(--text-muted); font-size: 14px; letter-spacing: 12px; opacity: 0.2; }
.section-divider::before { content: '· · ·'; }

/* 渐变数字 */
.gradient-num { font-family: 'EB Garamond', serif; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

/* 哲学引言卡片 */
.philosophy-quote { position: relative; padding: 28px 32px; background: rgba(255,255,255,0.015); border-radius: 0; margin: 20px 0; border-left: 2px solid var(--primary); border: 1px solid var(--border); border-left: 2px solid var(--primary); }
.philosophy-quote::before { content: '\201C'; position: absolute; top: 8px; left: 16px; font-size: 48px; color: var(--primary); opacity: 0.2; font-family: 'EB Garamond', Georgia, serif; }
.philosophy-quote .quote-text { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--text); line-height: 1.8; font-style: italic; padding-left: 8px; }
.philosophy-quote .quote-source { font-size: 12px; color: var(--text-muted); margin-top: 10px; text-align: right; letter-spacing: 1px; }

/* 代表人物标签 */
.thinker-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; background: rgba(139,92,246,0.08); border-radius: 0; font-size: 13px; color: var(--primary-light); margin-top: 12px; border: 1px solid rgba(139,92,246,0.2); }

/* 增强心理年龄主卡片 */
.psych-age-main { position: relative; overflow: hidden; }
.psych-age-main::before { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%); border-radius: 50%; }
.psych-age-main::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 160px; height: 160px; background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%); border-radius: 50%; }

/* 情绪哲学卡片 */
.philosophy-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(139,92,246,0.15); }
.philosophy-primary { padding: 24px; background: rgba(139,92,246,0.05); border-radius: 0; margin-bottom: 16px; border: 1px solid rgba(139,92,246,0.1); }
.philosophy-school { font-size: 12px; color: var(--text-muted); margin-top: 8px; letter-spacing: 2px; }

/* 闭幕卡片 */
.closing-card { background: rgba(255,255,255,0.02); text-align: center; padding: 40px 32px; border: 1px solid rgba(139,92,246,0.15); position: relative; overflow: hidden; }
.closing-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
.closing-card .closing-icon { font-size: 36px; margin-bottom: 16px; }
.closing-card .closing-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; margin-bottom: 12px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.closing-card .closing-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; max-width: 500px; margin: 0 auto; }
.closing-card .closing-sig { margin-top: 20px; font-size: 12px; color: var(--text-muted); letter-spacing: 3px; }

/* 维度分析增强 */
.dim-score-enhanced { font-family: 'EB Garamond', serif; font-size: 28px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

@media (max-width: 640px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } .question-card { padding: 28px 20px; } .q-text { font-size: 18px; } .philosophy-quote { padding: 20px 24px; } }

/* 年龄输入页面样式 */
.age-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
.age-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 0; padding: 48px 40px; max-width: 450px; width: 100%; text-align: center; position: relative; }
.age-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient); }
.age-icon { font-size: 64px; margin-bottom: 20px; }
.age-title { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; margin-bottom: 12px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.age-desc { color: var(--text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 32px; }
.age-input-wrap { margin-bottom: 32px; }
.age-input { width: 100%; padding: 16px 20px; font-size: 18px; font-family: 'EB Garamond', serif; border: 1px solid var(--border); border-radius: 0; text-align: center; outline: none; transition: all 0.2s; }
.age-input:focus { border-color: rgba(139,92,246,0.6); }
.age-input { color: var(--text); background: rgba(255,255,255,0.015); }
.age-input::placeholder { color: rgba(255,255,255,0.2); }
.age-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.age-start-btn { width: 100%; padding: 16px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: var(--primary-light); border-radius: 0; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
.age-start-btn:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.6); }
.age-start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 心理年龄卡片样式 */
.psych-age-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 20px; }
.psych-age-card { padding: 20px; background: rgba(255,255,255,0.015); border-radius: 0; text-align: center; border: 1px solid var(--border); }
.psych-age-icon { font-size: 32px; margin-bottom: 8px; }
.psych-age-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.psych-age-value { font-family: 'EB Garamond', serif; font-size: 28px; font-weight: 700; color: var(--primary); }
.psych-age-suffix { font-size: 14px; color: var(--text-muted); }
.psych-age-desc { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
.psych-age-main { padding: 32px; background: rgba(139,92,246,0.05); border: 1px solid rgba(139,92,246,0.15); border-radius: 0; text-align: center; margin-bottom: 20px; }
.psych-age-main-label { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.psych-age-main-value { font-family: 'EB Garamond', serif; font-size: 56px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.psych-age-main-type { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: var(--primary-light); margin-top: 8px; }
.psych-age-main-desc { font-size: 14px; color: var(--text-muted); margin-top: 12px; line-height: 1.7; }
</style>
</head>
<body>
<div class="noise"></div>

<div id="agePage" class="page active">
  <div class="age-page">
    <div class="age-card">
      <div class="age-icon">🧠</div>
      <div class="age-title">情绪智力测评</div>
      <div class="age-desc">在开始测评之前，请先输入您的实际年龄。<br>这将帮助我们为您生成更精准的心理年龄分析报告。</div>
      <div class="age-input-wrap">
        <input type="number" class="age-input" id="userAge" placeholder="请输入您的年龄" min="12" max="100" onkeypress="if(event.key==='Enter')startTest()">
        <div class="age-hint">请输入12-100之间的数字</div>
      </div>
      <button class="age-start-btn" id="startTestBtn" onclick="startTest()">开始测评</button>
    </div>
  </div>
</div>

<div id="testPage" class="page">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="exitTest()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>退出测试</button>
      <div class="progress-wrap">
        <div class="progress-text"><span id="current">1</span> / 40</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dim-tag" id="dimTag" style="display:none">情绪感知</div>
      <div class="q-num">问题 <span id="qNum">1</span></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="nav-btns">
        <button class="nav-btn secondary" id="prevBtn" onclick="prevQ()">上一题</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">下一题</button>
      </div>
    </div>
  </div>
</div>

<div id="resultPage" class="page">
  <div class="result-container">
    <div class="result-header"><h1>🧠 情绪智力测评报告</h1><p>宇宙认知盐究所 · Space Salt Lab</p></div>
    <div id="resultContent"></div>
  </div>
</div>

<div class="loading" id="loading"><div class="loading-box"><div class="spinner"></div><p>正在生成报告...</p></div></div>

<script>
let userAge = 0;

function startTest() {
  const ageInput = document.getElementById('userAge');
  const age = parseInt(ageInput.value);

  if (!age || age < 12 || age > 100) {
    alert('请输入有效的年龄（12-100岁）');
    ageInput.focus();
    return;
  }

  userAge = age;
  document.getElementById('agePage').classList.remove('active');
  document.getElementById('testPage').classList.add('active');
}

// 计算多场景心理年龄
function getPsychologicalAges(scores, realAge) {
  const total = scores.perceive + scores.facilitate + scores.understand + scores.manage;
  const maxScore = 160;

  // 基础心理年龄计算（根据总体情绪智力）
  const baseRatio = total / maxScore;

  // 不同场景的心理年龄计算
  const scenes = {
    // 职场心理年龄：主要看情绪管理和情绪运用
    workplace: {
      icon: '💼',
      label: '职场心理年龄',

      desc: ''
    },
    // 家庭心理年龄：主要看情绪感知和情绪管理

      icon: '🏠',
      label: '家庭心理年龄',
      score: (scores.perceive * 0.4 + scores.manage * 0.4 + scores.understand * 0.2) / 40,
      desc: ''
    },
    // 感情心理年龄：主要看情绪感知和情绪理解
    romance: {
      icon: '💕',
      label: '感情心理年龄',
      score: (scores.perceive * 0.4 + scores.understand * 0.35 + scores.facilitate * 0.25) / 40,
      desc: ''
    },
    // 挫折心理年龄：主要看情绪管理和情绪运用
    adversity: {
      icon: '🌊',
      label: '挫折应对年龄',
      score: (scores.manage * 0.5 + scores.facilitate * 0.3 + scores.understand * 0.2) / 40,
      desc: ''
    }
  };

  // 根据得分比例计算心理年龄（允许与实际年龄有较大差距）
  Object.keys(scenes).forEach(key => {
    const ratio = scenes[key].score;
    let psychAge;

    // 使用非线性映射，让极端分数产生戏剧性差距
    // ratio 范围 0~1，以 0.5 为分水岭
    // 最高分可比真实年龄大30岁，最低分可小25岁
    if (ratio >= 0.9) {
      // 极致情绪成熟，比真实年龄老20~30岁
      psychAge = Math.round(realAge + 20 + (ratio - 0.9) * 100);
    } else if (ratio >= 0.75) {
      // 成熟，比真实年龄老10~20岁
      psychAge = Math.round(realAge + 10 + (ratio - 0.75) * 67);
    } else if (ratio >= 0.6) {
      // 略微成熟，比真实年龄老0~10岁
      psychAge = Math.round(realAge + (ratio - 0.6) * 67);
    } else if (ratio >= 0.45) {
      // 略显稚嫩，比真实年龄小0~10岁
      psychAge = Math.round(realAge - (0.6 - ratio) * 67);
    } else if (ratio >= 0.3) {
      // 情绪较不成熟，比真实年龄小10~18岁
      psychAge = Math.round(realAge - 10 - (0.45 - ratio) * 53);
    } else {
      // 情绪极不成熟，比真实年龄小18~25岁
      psychAge = Math.round(realAge - 18 - (0.3 - ratio) * 23);
    }

    // 确保心理年龄在合理范围内
    psychAge = Math.max(5, Math.min(90, psychAge));
    scenes[key].age = psychAge;

    // 生成描述
    const diff = psychAge - realAge;
    if (diff >= 20) {
      scenes[key].desc = '智慧远超同龄，如历经沧桑的老灵魂';
    } else if (diff >= 12) {
      scenes[key].desc = '远超同龄人的情绪成熟度';
    } else if (diff >= 5) {
      scenes[key].desc = '展现出超越年龄的智慧';
    } else if (diff >= -4) {
      scenes[key].desc = '与实际年龄相符';
    } else if (diff >= -12) {
      scenes[key].desc = '有较大成长空间';
    } else if (diff >= -20) {
      scenes[key].desc = '情绪处理还在青涩阶段';
    } else {
      scenes[key].desc = '如同孩子般的情绪世界，纯粹而需要磨砺';
    }
  });

  // 计算综合心理年龄
  const avgPsychAge = Math.round((scenes.workplace.age + scenes.family.age + scenes.romance.age + scenes.adversity.age) / 4);

  // 综合心理年龄类型判定
  let mainType, mainDesc;
  const diff = avgPsychAge - realAge;

  if (diff >= 20) {
    mainType = '老灵魂觉醒者';

  } else if (diff >= 12) {

  } else if (diff >= 5) {
    mainType = '成熟稳重型';
    mainDesc = '你的情绪成熟度明显高于同龄人，在面对复杂的人际关系和情绪情境时，你通常能保持冷静和理性。你善于理解他人、调节情绪，这让你在工作和生活中都更加游刃有余。';
  } else if (diff >= -4) {
    mainType = '同龄优秀型';
    mainDesc = '你的情绪智力与实际年龄相符，并且在某些方面展现出优于同龄人的特质。你懂得识别和管理自己的情绪，在人际交往中表现得体。继续保持，你正在稳步成长。';
  } else if (diff >= -12) {
    mainType = '成长进行型';
    mainDesc = '你正在情绪智力的成长道路上前行。虽然在某些情境下可能会感到困惑或难以控制情绪，但这正是学习和成长的机会。尼采说："那杀不死我的，使我更强。"每一次情绪的冲撞都是磨砺，请允许自己慢慢来。';
  } else if (diff >= -20) {
    mainType = '情绪少年型';
    mainDesc = '在情绪处理上，你还保留着某种少年式的纯粹与直接——喜怒形于色，还没学会在情绪和表达之间建立一道缓冲。这既是局限，也是礼物：你比大多数人更真实，只是还需要时间学习如何与自己的情绪做朋友，而不只是被它们带着走。';
  } else {
    mainType = '原始情绪型';
    mainDesc = '你的情绪世界像一片未被驯化的荒野——强烈、直接、几乎没有过滤。心理学家温尼科特说，人需要一个"足够好的环境"才能学会情绪调节。也许你还没有遇到那样的环境，但这不是你的错。情绪智力的核心不是压抑感受，而是学会与之共存。你还有很远的路可以走。';
  }

  return {
    realAge,
    avgPsychAge,
    mainType,
    mainDesc,
    scenes
  };
}

let idx = 0;
let answers = new Array(40).fill(null);
const dims = questions.map(q => q.dim);

function render() {
  const q = questions[idx];
  const info = dimInfo[q.dim];
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx + 1) / 40 * 100) + '%';
  document.getElementById('dimTag').textContent = info.name;
  document.getElementById('dimTag').style.background = info.bg;
  document.getElementById('dimTag').style.color = info.color;
  document.getElementById('qText').textContent = q.text;

  let optHtml = '';
  q.options.forEach((opt, i) => {
    const selected = answers[idx] === i ? 'selected' : '';
    optHtml += `<div class="opt ${selected}" onclick="select(${i})"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
  });
  document.getElementById('options').innerHTML = optHtml;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === 39 ? '查看结果' : '下一题';
}

function select(v) { answers[idx] = v; render(); if (idx < 39) setTimeout(() => nextQ(), 250); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() {
  if (answers[idx] === null) { alert('请先选择一个选项'); return; }
  if (idx < 39) { idx++; render(); } else showResult();
}

function exitTest() { if (confirm('确定退出？答案将不会保存。')) { goToHome(); } }
function goToHome() {
  const userSource = sessionStorage.getItem('user_source');
  if (userSource === 'platform') { window.location.href = '../platform.html'; }
  else { window.location.href = 'index.html'; }
}
function getHomeButtonHtml() {
  const userSource = sessionStorage.getItem('user_source');
  if (userSource === 'platform') { return '<button class="restart-btn" onclick="goToHome()" style="margin-left:8px">返回测试中心</button>'; }
  else { return '<button class="restart-btn more-tests-btn" onclick="showMoreTests()" style="margin-left:8px">更多测试</button>'; }
}
function showMoreTests() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal-content"><div class="modal-icon">🧂</div><h3>更多专业测评</h3><p>请在宇宙认知盐究所购买其他测试哦~</p><div class="modal-buttons"><button class="modal-btn primary" onclick="closeModal()">知道了</button></div></div>`;
  document.body.appendChild(modal);
  setTimeout(() => modal.classList.add('show'), 10);
}
function closeModal() { const modal = document.querySelector('.modal-overlay'); if (modal) { modal.classList.remove('show'); setTimeout(() => modal.remove(), 300); } }

function calcScores() {
  const scores = { perceive: 0, facilitate: 0, understand: 0, manage: 0 };
  answers.forEach((v, i) => { scores[dims[i]] += (4 - v); }); // 0=非常符合=4分, 4=完全不符合=0分
  return scores;
}

function getLevel(score, max) {
  const pct = score / max;
  if (pct >= 0.8) return { level: '优秀', color: '#059669', class: 'level-high' };
  if (pct >= 0.6) return { level: '良好', color: '#d97706', class: 'level-medium' };
  return { level: '有潜力', color: '#6366f1', class: 'level-medium' };
}

function getEQLevel(total) {
  for (const l of EQ_LEVELS) { if (total >= l.min) return l; }
  return EQ_LEVELS[EQ_LEVELS.length - 1];
}

// 根据得分计算"情绪哲学"类型
function getEmotionPhilosophy(scores) {
  const total = scores.perceive + scores.facilitate + scores.understand + scores.manage;
  const maxDim = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const minDim = Object.entries(scores).sort((a, b) => a[1] - b[1])[0][0];

  const philosophies = {
    perceive: { name: '现象学路径', icon: '🌊', school: '胡塞尔 · 梅洛-庞蒂', desc: '你的情绪智力以"感知"为核心引擎。你像现象学家一样，先回到事物本身——先感受，再思考。你的世界是鲜活的、感性的、充满质感的。' },
    facilitate: { name: '实用主义路径', icon: '🔥', school: '威廉·詹姆斯 · 杜威', desc: '你的情绪智力以"运用"为核心动力。你像实用主义哲学家一样，关心的不是情绪"是什么"，而是它"能做什么"。对你而言，情绪是工具箱里的锤子和螺丝刀。' },
    understand: { name: '理性主义路径', icon: '💎', school: '斯宾诺莎 · 黑格尔', desc: '你的情绪智力以"理解"为核心优势。你像理性主义哲学家一样，相信理解即解放——当你看透一种情绪的结构和来源时，它就失去了控制你的力量。' },
    manage: { name: '斯多葛路径', icon: '🏛️', school: '爱比克泰德 · 塞涅卡', desc: '你的情绪智力以"管理"为核心能力。你像斯多葛学派的贤者一样，追求的是面对一切波澜时的内心宁静。你的力量不在于感受得多深，而在于站得多稳。' }
  };

  const primary = philosophies[maxDim];
  const secondary = philosophies[minDim];

  let balanceNote = '';
  const range = Math.max(...Object.values(scores)) - Math.min(...Object.values(scores));
  if (range <= 5) {
    balanceNote = '你的四个维度非常均衡，像一个完美的正方形。你没有明显的短板，这意味着你可以在不同情境下灵活调用不同的情绪能力。在哲学上，这接近亚里士多德所说的"中庸之道"——不偏不倚，恰到好处。';
  } else if (range <= 12) {
    balanceNote = '你的情绪智力呈现出有趣的"高低起伏"。你在某些方面特别突出，在另一些方面还有成长空间。这种不平衡并非坏事——它赋予了你独特的情绪"人格"，让你在擅长的领域成为专家。';
  } else {
    balanceNote = '你的情绪智力维度之间存在较大的落差，这可能会造成一种内在的张力——比如你能深刻理解情绪却难以管理它，或者能管理自己的情绪却不太能感知他人。这种张力本身就是一个邀请，邀请你去探索和发展那些尚未被开发的区域。';
  }

  return { primary, secondary, balanceNote };
}

function restart() { if (confirm('确定要重新测试吗？')) location.reload(); }

async function downloadPDF() {

  const loading = document.getElementById('loading');
  btn.disabled = true; btn.innerHTML = '生成中...'; loading.classList.add('show');
  try {
    const scores = calcScores();
    const total = scores.perceive + scores.facilitate + scores.understand + scores.manage;
    const eqLevel = getEQLevel(total);
    const date = new Date().toLocaleDateString('zh-CN');

    const pdfContainer = document.createElement('div');
    pdfContainer.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;background:#0f172a;padding:40px;font-family:"Noto Sans SC",sans-serif;color:#e2e8f0;';
    pdfContainer.innerHTML = `
      <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:50px 40px;margin:-40px -40px 30px -40px;text-align:center;color:#fff;">
        <div style="font-size:16px;margin-bottom:10px;opacity:0.9;">宇宙认知盐究所 · Space Salt Lab</div>
        <div style="font-size:32px;font-weight:700;margin-bottom:15px;">情绪智力测评报告</div>
        <div style="font-size:14px;opacity:0.8;">测评日期：${date}</div>
      </div>
      <div style="text-align:center;margin-bottom:25px;">
        <div style="font-size:14px;color:#94a3b8;margin-bottom:8px;">你的情绪智力分数</div>
        <div style="font-size:56px;font-weight:700;color:#a78bfa;">${total}</div>
        <div style="display:inline-block;padding:8px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:20px;font-weight:600;">${eqLevel.level}</div>
        <div style="color:#94a3b8;font-size:14px;line-height:1.8;margin-top:16px;max-width:600px;margin-left:auto;margin-right:auto;">${eqLevel.desc}</div>
      </div>
      <div style="display:flex;gap:15px;margin-bottom:25px;">
        ${Object.keys(dimInfo).map(d => {
          const lv = getLevel(scores[d], 40);
          return `<div style="flex:1;background:#1e293b;border-radius:12px;padding:20px;text-align:center;">
            <div style="font-size:28px;font-weight:700;color:#a78bfa;">${scores[d]}</div>
            <div style="font-size:12px;color:#94a3b8;">${dimInfo[d].name}</div>
            <div style="font-size:11px;color:${lv.color};margin-top:4px;">${lv.level}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;margin-bottom:15px;">📊 四维度详细分析</div>
        ${Object.keys(dimInfo).map(d => {
          const info = dimInfo[d];
          const score = scores[d];
          const lv = getLevel(score, 40);
          return `<div style="margin-bottom:16px;padding:16px;background:#1e293b;border-radius:0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-weight:600;color:#e2e8f0;">${info.icon} ${info.name}</span>
              <span style="color:${lv.color};font-weight:500;">${score}/40 · ${lv.level}</span>
            </div>
            <div style="height:8px;background:#334155;border-radius:4px;overflow:hidden;margin-bottom:10px;">
              <div style="height:100%;width:${(score/40)*100}%;background:${info.color};border-radius:4px;"></div>
            </div>
            <div style="font-size:13px;color:#94a3b8;line-height:1.7;">${getDimAnalysis(d, score)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-bottom:25px;">
        <div style="font-size:18px;font-weight:600;margin-bottom:15px;">💡 提升建议</div>
        <div style="padding:12px 16px;background:#1e293b;border-radius:8px;margin-bottom:8px;border-left:4px solid #a78bfa;font-size:14px;color:#94a3b8;">每天花5分钟写情绪日记，记录当天经历的主要情绪及其触发因素</div>
        <div style="padding:12px 16px;background:#1e293b;border-radius:8px;margin-bottom:8px;border-left:4px solid #a78bfa;font-size:14px;color:#94a3b8;">练习正念冥想，增强对当下情绪状态的觉察能力</div>
        <div style="padding:12px 16px;background:#1e293b;border-radius:8px;margin-bottom:8px;border-left:4px solid #a78bfa;font-size:14px;color:#94a3b8;">在感到强烈情绪时，尝试"暂停-呼吸-选择"的三步法</div>

      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;text-align:center;color:#94a3b8;font-size:12px;">
        <div style="margin-bottom:8px;font-weight:500;">宇宙认知盐究所 · Space Salt Lab</div>
        <div>本报告仅供参考，不构成心理诊断</div>
      </div>
    `;
    document.body.appendChild(pdfContainer);
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    const canvas = await html2canvas(pdfContainer, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#0f172a',
      height: pdfContainer.scrollHeight,
      windowHeight: pdfContainer.scrollHeight
    });
    document.body.removeChild(pdfContainer);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const pdfW = 210, pdfH = 297;
    const imgW = canvas.width, imgH = canvas.height;
    const ratio = imgW / imgH;
    let finalW = pdfW - 20;
    let finalH = finalW / ratio;

    if (finalH <= pdfH - 20) {
      pdf.addImage(imgData, 'JPEG', 10, 10, finalW, finalH);
    } else {
      let remainingH = imgH, srcY = 0;
      const pagePixelH = (pdfH - 20) / finalH * imgH;
      while (remainingH > 0) {
        const sliceH = Math.min(remainingH, pagePixelH);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = imgW;
        sliceCanvas.height = sliceH;
        sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
        const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
        if (srcY > 0) pdf.addPage();
        pdf.addImage(sliceData, 'JPEG', 10, 10, finalW, finalW / (imgW / sliceH));
        srcY += sliceH;
        remainingH -= sliceH;
      }
    }
    pdf.save(`情绪智力测评报告_${total}分_${date}.pdf`);
  } catch (e) { console.error(e); alert('PDF生成失败'); }
  finally { btn.disabled = false; btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下载PDF报告'; loading.classList.remove('show'); }
}
